function AdminConsole({ appUser, handleLogout, showToast, firebaseUser }) {
  const t = useContext(ThemeContext);
  const [users, setUsers] = useState([]);
  const [newUsername, setNewUsername] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [newDob, setNewDob] = useState('');
  const [newRole, setNewRole] = useState('user');
  const [showPasswords, setShowPasswords] = useState({});
  const [editingId, setEditingId] = useState(null);
  const [managingUser, setManagingUser] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

  useEffect(() => {
    if (!firebaseUser) return;
    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'appUsers');
    const unsub = onSnapshot(colRef, snap => {
      const arr = [];
      snap.forEach(d => {
         const data = d.data();
         arr.push({id: d.id, ...data, password: Cipher.decode(data.password || '')});
      });
      setUsers(arr);
    });
    return () => unsub();
  }, [firebaseUser]);

  const handleSaveUser = async (e) => {
    e.preventDefault();
    if (!newUsername || !newPassword || !newDob) return showToast('Fill required fields', 'error');
    
    try {
       if (editingId) {
           const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', editingId);
           await updateDoc(docRef, { username: newUsername, password: Cipher.encode(newPassword), role: newRole, dob: newDob });
           showToast('Operator updated successfully');
           setEditingId(null);
       } else {
           if (users.some(u => u.username.toLowerCase() === newUsername.toLowerCase())) return showToast('Username already exists', 'error');
           
           const uniqueUserId = `${newUsername}_${newDob}`.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
           const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', uniqueUserId);
           
           await setDoc(docRef, { username: newUsername, password: Cipher.encode(newPassword), role: newRole, dob: newDob });
           showToast('User provisioned successfully');
       }
       setNewUsername(''); setNewPassword(''); setNewDob(''); setNewRole('user');
    } catch(err) { showToast('Error saving user', 'error'); }
  };

  const triggerEdit = (u) => {
     setEditingId(u.id);
     setNewUsername(u.username);
     setNewPassword(u.password);
     setNewDob(u.dob || '');
     setNewRole(u.role || 'user');
  };

  const cancelEdit = () => {
     setEditingId(null);
     setNewUsername('');
     setNewPassword('');
     setNewDob('');
     setNewRole('user');
  };

  const generateSecurePassword = () => {
     const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
     let pass = '';
     for (let i = 0; i < 12; i++) {
        pass += chars.charAt(Math.floor(Math.random() * chars.length));
     }
     setNewPassword(pass);
     showToast('Secure password generated!');
  };

  const handleDeleteUser = (id) => {
     setConfirmDialog({
       isOpen: true,
       title: 'Revoke Operator & Purge Data',
       message: 'Are you sure you want to permanently delete this user? ALL of their linked telemetry (vehicles, maintenance, etc.) will be permanently eradicated alongside their account.',
       onConfirm: async () => {
           try {
             const collectionsToWipe = ['vehicles', 'maintenance', 'consumables', 'reminders'];
             for (const colName of collectionsToWipe) {
                const snapshot = await getDocs(collection(db, 'artifacts', appId, 'users', id, colName));
                await Promise.all(snapshot.docs.map(d => deleteDoc(d.ref)));
             }
             await deleteDoc(doc(db, 'artifacts', appId, 'users', id, 'settings', 'customOptions'));
             await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', id));
             
             showToast('User and all associated data purged successfully');
             if (editingId === id) cancelEdit();
           } catch(err) { showToast('Error deleting user and data', 'error'); }
       }
     });
  };

  const togglePassword = (id) => {
     setShowPasswords(prev => ({ ...prev, [id]: !prev[id] }));
  };

  return (
    <div className={`min-h-screen ${t.bg} transition-colors duration-500`}>
      {/* Responsive Header */}
      <header className={`sticky top-0 z-30 border-b backdrop-blur-md px-4 sm:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 ${t.card}`}>
         <div className="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white shadow-lg shrink-0">
               <ShieldAlert size={20} />
            </div>
            <div>
               <h1 className="text-xl font-black uppercase tracking-widest leading-tight">Admin Command</h1>
               <p className={`text-[10px] font-bold uppercase tracking-widest ${t.muted}`}>Global Access Portal</p>
            </div>
         </div>
         <button onClick={handleLogout} className={`w-full sm:w-auto px-5 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 border transition-all ${t.btnDanger}`}>
            <LogOut size={18} /> Secure Logout
         </button>
      </header>

      <main className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6 lg:space-y-8">
         <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
            
            {/* Form Section */}
            <div className={`lg:col-span-1 p-5 sm:p-6 rounded-3xl border shadow-lg h-fit ${t.card}`}>
               <h2 className="text-xl font-black mb-6 flex items-center gap-2 border-b pb-4 border-current border-opacity-10">
                  {editingId ? <><Edit3 size={20} className={t.accent} /> Edit Operator</> : <><Plus size={20} className={t.accent} /> Provision Operator</>}
               </h2>
               <form onSubmit={handleSaveUser} className="space-y-4">
                  {/* Custom Input for better mobile support */}
                  <div className="space-y-2">
                     <label className={`block text-xs font-bold uppercase tracking-widest ${t.muted}`}>Username *</label>
                     <input type="text" value={newUsername} onChange={e => setNewUsername(e.target.value)} required disabled={!!editingId} autoComplete="off" placeholder="e.g. driver_john" className={`w-full rounded-2xl px-4 py-3 sm:py-4 outline-none transition-all font-bold border ${t.input} ${editingId ? 'opacity-50 cursor-not-allowed' : ''}`} />
                  </div>
                  
                  <div className="space-y-2">
                     <label className={`block text-xs font-bold uppercase tracking-widest ${t.muted}`}>Date of Birth *</label>
                     <input type="date" value={newDob} onChange={e => setNewDob(e.target.value)} required disabled={!!editingId} className={`w-full rounded-2xl px-4 py-3 sm:py-4 outline-none transition-all font-bold border ${t.input} ${editingId ? 'opacity-50 cursor-not-allowed' : ''}`} />
                  </div>
                  
                  <div className="space-y-2 w-full min-w-0">
                     <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Security Key (Password) *</label>
                     <div className="flex gap-2">
                        <input 
                           type="text" 
                           className={`w-full min-w-0 rounded-2xl px-4 py-3 sm:py-4 outline-none transition-all font-mono font-bold truncate border ${t.input}`}
                           value={newPassword} 
                           onChange={e => setNewPassword(e.target.value)} 
                           placeholder="••••••••" 
                           required 
                           autoComplete="new-password"
                        />
                        <button 
                           type="button" 
                           onClick={generateSecurePassword} 
                           className={`px-4 rounded-2xl border shadow-sm transition-all active:scale-95 flex items-center justify-center shrink-0 ${t.iconBg} hover:opacity-80`} 
                           title="Generate Secure Password"
                        >
                           <Zap size={20} />
                        </button>
                     </div>
                  </div>

                  <div className="space-y-2">
                    <label className={`block text-xs font-bold uppercase tracking-widest ${t.muted}`}>Access Level</label>
                    <select value={newRole} onChange={e => setNewRole(e.target.value)} className={`w-full rounded-2xl px-4 py-3 sm:py-4 outline-none transition-all font-bold border appearance-none cursor-pointer ${t.input}`}>
                       <option value="user">Standard User</option>
                       <option value="manager">Fleet Manager</option>
                    </select>
                  </div>

                  <div className="pt-2 flex flex-col sm:flex-row gap-3">
                     <button type="submit" className={`w-full sm:flex-1 py-3 sm:py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl active:scale-[0.98] flex justify-center items-center gap-2 ${t.btnPrimary}`}>
                        <ShieldCheck size={18} /> {editingId ? 'Update' : 'Provision'}
                     </button>
                     {editingId && (
                        <button type="button" onClick={cancelEdit} className={`w-full sm:flex-1 py-3 sm:py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-sm active:scale-[0.98] border ${t.card}`}>
                           Cancel
                        </button>
                     )}
                  </div>
               </form>
            </div>

            {/* Table Section */}
            <div className={`lg:col-span-2 p-5 sm:p-6 rounded-3xl border shadow-lg h-fit flex flex-col overflow-hidden ${t.card}`}>
               <h2 className="text-xl font-black mb-6 flex items-center gap-2 border-b pb-4 border-current border-opacity-10">
                  <Users size={20} className={t.accent} /> Active Operators ({users.length})
               </h2>
               
               {/* Responsive Wrapper for Table */}
               <div className="w-full overflow-x-auto custom-scrollbar -mx-5 px-5 sm:mx-0 sm:px-0 pb-4">
                  <table className="w-full text-left border-collapse min-w-[700px]">
                     <thead>
                        <tr className={`border-b border-current border-opacity-10 uppercase tracking-widest text-[10px] font-black ${t.muted}`}>
                           <th className="pb-4 px-2 whitespace-nowrap">Operator ID</th>
                           <th className="pb-4 px-2 whitespace-nowrap">Security Key</th>
                           <th className="pb-4 px-2 whitespace-nowrap">D.O.B</th>
                           <th className="pb-4 px-2 whitespace-nowrap">Clearance</th>
                           <th className="pb-4 px-2 text-right whitespace-nowrap">Actions</th>
                        </tr>
                     </thead>
                     <tbody className="divide-y divide-current divide-opacity-5">
                        {users.map(u => (
                           <tr key={u.id} className="group hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                              <td className="py-4 px-2 font-bold flex items-center gap-3">
                                 <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs border ${t.iconBg}`}><UserIcon size={14}/></div>
                                 <span className="truncate">{u.username}</span>
                              </td>
                              <td className="py-4 px-2">
                                 <div className="flex items-center gap-2">
                                    <span className="font-mono text-sm opacity-80 bg-black/5 dark:bg-white/5 px-2 py-1 rounded-md tracking-wider">
                                       {showPasswords[u.id] ? u.password : '••••••••'}
                                    </span>
                                    <button onClick={() => togglePassword(u.id)} className={`p-1.5 rounded-md transition-colors hover:bg-black/10 dark:hover:bg-white/10 ${t.muted}`} title="Toggle Visibility">
                                       {showPasswords[u.id] ? <EyeOff size={14} /> : <Eye size={14} />}
                                    </button>
                                 </div>
                              </td>
                              <td className="py-4 px-2 text-sm font-medium opacity-80 whitespace-nowrap">{formatDate(u.dob)}</td>
                              <td className="py-4 px-2">
                                 <span className={`px-2.5 py-1 text-[10px] font-black uppercase tracking-widest rounded-lg border shadow-inner ${u.role === 'manager' ? 'bg-purple-500/10 text-purple-500 border-purple-500/20' : t.badgeMaint}`}>
                                    {u.role}
                                 </span>
                              </td>
                              <td className="py-4 px-2 text-right whitespace-nowrap">
                                 <div className="flex items-center justify-end gap-2">
                                    <button onClick={() => setManagingUser(u)} className={`p-2 rounded-lg transition-all border shadow-sm hover:bg-black/5 dark:hover:bg-white/5 border-current border-opacity-20`} title="Manage User Data">
                                       <Database size={16} className="text-blue-500" />
                                    </button>
                                    <button onClick={() => triggerEdit(u)} className={`p-2 rounded-lg transition-all border shadow-sm hover:bg-black/5 dark:hover:bg-white/5 border-current border-opacity-20`} title="Edit Operator">
                                       <Edit3 size={16} className={t.accent} />
                                    </button>
                                    <button onClick={() => handleDeleteUser(u.id)} className={`p-2 rounded-lg transition-all border shadow-sm text-rose-500 hover:bg-rose-500 hover:text-white border-rose-500/30 bg-rose-500/5`} title="Revoke Access & Purge Data">
                                       <Trash2 size={16} />
                                    </button>
                                 </div>
                              </td>
                           </tr>
                        ))}
                        {users.length === 0 && (
                           <tr>
                              <td colSpan="5" className={`py-8 text-center text-sm font-bold border-dashed border rounded-xl m-4 ${t.muted}`}>No operators provisioned yet.</td>
                           </tr>
                        )}
                     </tbody>
                  </table>
               </div>
            </div>
         </div>
      </main>

      {/* Render Data Management Modal if active */}
      {managingUser && (
         <ManageUserDataModal 
           user={managingUser} 
           onClose={() => setManagingUser(null)} 
           showToast={showToast} 
         />
      )}

      {/* Confirm Dialog */}
      {confirmDialog.isOpen && (
         <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
            <div className={`border shadow-2xl w-full max-w-md p-6 sm:p-8 rounded-3xl transform transition-all animate-fade-in-up border-rose-500/50 ${t.card}`}>
               <div className="w-16 h-16 rounded-full flex items-center justify-center mb-6 shadow-inner border bg-rose-500/20 text-rose-500 border-rose-500/30 mx-auto sm:mx-0">
                  <AlertTriangle size={32} />
               </div>
               <h3 className="text-xl font-black mb-2 text-center sm:text-left">{confirmDialog.title}</h3>
               <p className={`text-sm font-bold mb-8 text-center sm:text-left ${t.muted}`}>{confirmDialog.message}</p>
               <div className="flex flex-col sm:flex-row justify-end gap-3 sm:gap-4 w-full">
                  <button onClick={() => setConfirmDialog({ isOpen: false, title: '', message: '', onConfirm: null })} className={`w-full sm:w-auto px-5 py-3 sm:py-2.5 rounded-xl font-bold border transition-colors ${t.card}`}>Cancel</button>
                  <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({ isOpen: false, title: '', message: '', onConfirm: null }); }} className={`w-full sm:w-auto px-5 py-3 sm:py-2.5 rounded-xl font-bold transition-all shadow-lg text-white bg-rose-600 hover:bg-rose-500`}>Confirm Delete</button>
               </div>
            </div>
         </div>
      )}
    </div>
  );
}
