// --- Custom Hooks ---
function useLocalStorage(key, initialValue) {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item && item !== 'null' && item !== 'undefined' ? JSON.parse(item) : initialValue;
    } catch (error) {
      console.error(error);
      return initialValue;
    }
  });

  useEffect(() => {
    try {
      if (storedValue === null || storedValue === undefined) {
         window.localStorage.removeItem(key);
      } else {
         window.localStorage.setItem(key, JSON.stringify(storedValue));
      }
    } catch (error) {
      console.error(error);
    }
  }, [key, storedValue]);

  return [storedValue, setStoredValue];
}

const isExpiringSoon = (dateString) => {
  if (!dateString) return false;
  const expiryDate = new Date(dateString);
  const today = new Date();
  const thirtyDaysFromNow = new Date();
  thirtyDaysFromNow.setDate(today.getDate() + 30);
  return expiryDate > today && expiryDate <= thirtyDaysFromNow;
};

  if (!dateString) return false;

// --- Simple Encryption Utility ---
const SECRET_KEY = "AF_SEC_99";
const Cipher = {
  encode: (text) => {
    if (!text) return '';
    const encoded = encodeURIComponent(text);
    let result = '';
    for (let i = 0; i < encoded.length; i++) {
      result += String.fromCharCode(encoded.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
    }
    return btoa(result);
  },
  decode: (text) => {
    if (!text) return '';
    try {
      const decodedBase64 = atob(text);
      let result = '';
      for (let i = 0; i < decodedBase64.length; i++) {
        result += String.fromCharCode(decodedBase64.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
      }
      return decodeURIComponent(result);
    } catch (e) {
      return text; // Fallback for existing plain text passwords
    }
  }
};

      }
    };

  }, []);

  const useFirestoreCollection = (collectionName, initialValue) => {
    const [state, setState] = useState(initialValue);

    useEffect(() => {
      // Ensure we have both auth user and logged-in appUser (skip if admin)
      if (!user || !appUser || appUser.role === 'admin') return;
      const colRef = collection(db, 'artifacts', appId, 'users', appUser.uid, collectionName);
      const unsubscribe = onSnapshot(colRef, (snapshot) => {
        const items = [];
        snapshot.forEach(d => items.push({ ...d.data(), id: d.id }));
        setState(items);
      }, (err) => console.error("Sync error", err));
      return () => unsubscribe();
    }, [user, appUser, collectionName]);

    const updateState = async (updater) => {
      const newState = typeof updater === 'function' ? updater(state) : updater;
      setState(newState); 

      if (!user || !appUser) return;

      const currentIds = new Set(state.map(item => item.id));
      const newIds = new Set(newState.map(item => item.id));
      
      const toDelete = state.filter(item => !newIds.has(item.id));
      const toUpdateOrAdd = newState.filter(newItem => {
        if (!currentIds.has(newItem.id)) return true; 
        const oldItem = state.find(i => i.id === newItem.id);
        return JSON.stringify(oldItem) !== JSON.stringify(newItem); 
      });

      const colRef = collection(db, 'artifacts', appId, 'users', appUser.uid, collectionName);
      
      try {
        toDelete.forEach(item => deleteDoc(doc(colRef, item.id)));
        toUpdateOrAdd.forEach(item => setDoc(doc(colRef, item.id), item));
      } catch (err) {
        console.error("Firestore write error:", err);
      }
    };

    return [state, updateState];
  };

  const useFirestoreDoc = (docName, initialValue) => {
    const [state, setState] = useState(initialValue);

    useEffect(() => {
      // Ensure we have both auth user and logged-in appUser (skip if admin)
      if (!user || !appUser || appUser.role === 'admin') return;
      const docRef = doc(db, 'artifacts', appId, 'users', appUser.uid, 'settings', docName);
      const unsubscribe = onSnapshot(docRef, (docSnap) => {
        if (docSnap.exists()) {
          setState(docSnap.data());
        } else {
          setState(initialValue);
        }
      }, (err) => console.error(err));
      return () => unsubscribe();
    }, [user, appUser, docName]);

    const updateState = async (updater) => {
      const newState = typeof updater === 'function' ? updater(state) : updater;
      setState(newState); 
      if (!user || !appUser) return;
      try {
        const docRef = doc(db, 'artifacts', appId, 'users', appUser.uid, 'settings', docName);

function AnimatedCounter({ value, isCurrency = false, isDistance = false, className = "" }) {
  const [displayValue, setDisplayValue] = useState(0);
  const [isCompact, setIsCompact] = useState(false);
  const containerRef = React.useRef(null);
  const fullTextRef = React.useRef(null);

  useEffect(() => {
    let start = 0;
    const end = parseInt(value, 10) || 0;
    if (start === end) {
      setDisplayValue(end);
      return;
    }
    
    let startTime = null;
    const duration = 1200;

    const animate = (currentTime) => {
      if (!startTime) startTime = currentTime;
      const progress = Math.min((currentTime - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 4); 
      setDisplayValue(Math.floor(ease * (end - start) + start));
      
      if (progress < 1) requestAnimationFrame(animate);
      else setDisplayValue(end);
    };
    
    requestAnimationFrame(animate);
  }, [value]);

  useEffect(() => {
    if (!containerRef.current || !fullTextRef.current) return;
    
    const checkWidth = () => {
      if (!containerRef.current || !fullTextRef.current) return;
      const fullWidth = fullTextRef.current.offsetWidth;
      const allocatedWidth = containerRef.current.offsetWidth;
      
      // Use requestAnimationFrame to prevent ResizeObserver loop limit errors
      requestAnimationFrame(() => {
        if (fullWidth > allocatedWidth + 4) { // 4px buffer
          setIsCompact(true);
        } else {
          setIsCompact(false);
        }
      });
    };

    const observer = new ResizeObserver(checkWidth);
    observer.observe(containerRef.current);
    checkWidth();

    return () => observer.disconnect();
  }, [displayValue]);

  const formatCompact = (val) => {
    if (val >= 10000000) return +(val / 10000000).toFixed(2) + 'Cr';
    if (val >= 100000) return +(val / 100000).toFixed(2) + 'L';
    if (val >= 1000) return +(val / 1000).toFixed(2) + 'K';
    return val.toLocaleString('en-IN');
  };

  const getFormatted = (val, compact) => {
    if (compact) {
      const numStr = formatCompact(val);
      if (isCurrency) return `₹${numStr}`;
      if (isDistance) return `${numStr} km`;
      return numStr;
    } else {
      if (isCurrency) return formatCurrency(val);
      if (isDistance) return `${val.toLocaleString('en-IN')} km`;
      return val.toLocaleString('en-IN');
    }
  };

  return (
    <span ref={containerRef} className={`relative inline-flex w-full max-w-full overflow-hidden align-bottom font-mono tracking-tight ${className}`}>
      <span ref={fullTextRef} className="absolute invisible whitespace-nowrap pointer-events-none" aria-hidden="true">
        {getFormatted(displayValue, false)}
      </span>
      <span className="truncate w-full">
        {getFormatted(displayValue, isCompact)}
      </span>
    </span>
  );
}

      <div className="flex items-center gap-4 md:gap-5 min-w-0 z-20 relative">
         <div className={`${t.isCompact ? 'p-2 rounded-lg' : 'p-3 rounded-2xl'} bg-white/10 backdrop-blur-md border border-white/20 shadow-inner flex-shrink-0`}>
            {Icon && <Icon size={t.isCompact ? 24 : 32} className={`text-cyan-400 ${iconClass}`} />}
         </div>
         <div>
            <h1 className={`${t.isCompact ? 'text-2xl md:text-3xl' : 'text-3xl md:text-4xl'} font-black tracking-tight text-white drop-shadow-md ${t.isCompact ? '' : 'italic transform -skew-x-6'}`}>
              {title}
            </h1>
            <p className={`mt-1 text-zinc-400 font-medium tracking-wide ${t.isCompact ? 'text-xs' : 'text-sm'} flex items-center gap-2`}>
              {subtitle}
            </p>
         </div>
      </div>

      {actionLabel && (
        <button onClick={onAction} className={`relative z-20 w-full sm:w-auto ${t.isCompact ? 'px-4 py-2 rounded-lg text-xs' : 'px-6 py-3 rounded-xl text-sm'} font-bold bg-white text-black hover:bg-cyan-50 transition-all shadow-[0_0_20px_rgba(255,255,255,0.3)] active:scale-95 flex items-center justify-center gap-2 group/btn overflow-hidden`}>
           <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/40 to-transparent transform -skew-x-12 -translate-x-full group-hover/btn:animate-logo-shine pointer-events-none"></div>
           {ActionIcon && <ActionIcon size={t.isCompact ? 16 : 18} className="group-hover/btn:rotate-90 transition-transform" />}
           <span className="uppercase tracking-wider">{actionLabel}</span>
        </button>
      )}
    </div>
  );
}

// --- Views ---

function Dashboard({ vehicles, maintenance, consumables, reminders, setReminders, navigateTo, showToast }) {
  const t = useContext(ThemeContext);
  const [searchQuery, setSearchQuery] = useState('');
  const [activeSearch, setActiveSearch] = useState('');
  const [isSearchFocused, setIsSearchFocused] = useState(false);

  const totalExpense = useMemo(() => {
    const maintCost = maintenance.reduce((sum, record) => sum + (Number(record.totalCost) || 0), 0);
    const consCost = (consumables || []).reduce((sum, record) => sum + (Number(record.cost) || 0), 0);
    return maintCost + consCost;
  }, [maintenance, consumables]);

  const tcoProjection = useMemo(() => {
    const ninetyDaysAgo = new Date();
    ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

    let sum90Days = 0;
    maintenance.forEach(m => {
      if (new Date(m.date) >= ninetyDaysAgo) sum90Days += (Number(m.totalCost) || 0);
    });
    (consumables || []).forEach(c => {
      if (new Date(c.date) >= ninetyDaysAgo) sum90Days += (Number(c.cost) || 0);
    });

    // Annualize the 90-day spend
    return sum90Days * (365 / 90);
  }, [maintenance, consumables]);

  const vehicleExpenses = useMemo(() => {
    const expenses = {};
    vehicles.forEach(v => expenses[v.id] = { total: 0, maint: 0, cons: 0 });
    maintenance.forEach(record => {
      if (expenses[record.vehicleId]) {
        expenses[record.vehicleId].maint += (Number(record.totalCost) || 0);
        expenses[record.vehicleId].total += (Number(record.totalCost) || 0);
      }
    });
    (consumables || []).forEach(record => {
      if (expenses[record.vehicleId]) {
        expenses[record.vehicleId].cons += (Number(record.cost) || 0);
        expenses[record.vehicleId].total += (Number(record.cost) || 0);
      }
    });
    return expenses;
  }, [maintenance, consumables, vehicles]);

  const expiringAlerts = useMemo(() => {
    const alerts = [];
    vehicles.forEach(v => {
      // Insurance & Pollution
      if (isExpired(v.insuranceDate)) alerts.push({ id: v.id, name: v.number, type: 'Insurance', status: 'Expired', date: v.insuranceDate });
      else if (isExpiringSoon(v.insuranceDate)) alerts.push({ id: v.id, name: v.number, type: 'Insurance', status: 'Expiring Soon', date: v.insuranceDate });
      
      if (isExpired(v.pollutionDate)) alerts.push({ id: v.id, name: v.number, type: 'Pollution', status: 'Expired', date: v.pollutionDate });
      else if (isExpiringSoon(v.pollutionDate)) alerts.push({ id: v.id, name: v.number, type: 'Pollution', status: 'Expiring Soon', date: v.pollutionDate });
      
      // Warranty
      if (v.warrantyDate) {
        if (isExpired(v.warrantyDate)) alerts.push({ id: v.id, name: v.number, type: 'Warranty', status: 'Expired', date: v.warrantyDate });
        else if (isExpiringSoon(v.warrantyDate)) alerts.push({ id: v.id, name: v.number, type: 'Warranty', status: 'Expiring Soon', date: v.warrantyDate });
      }

      // Maintenance Package
      if (v.hasMaintPkg && v.maintPkgExpiryDate) {
        if (isExpired(v.maintPkgExpiryDate)) alerts.push({ id: v.id, name: v.number, type: 'Maint Pkg', status: 'Expired', date: v.maintPkgExpiryDate });
        else if (isExpiringSoon(v.maintPkgExpiryDate)) alerts.push({ id: v.id, name: v.number, type: 'Maint Pkg', status: 'Expiring Soon', date: v.maintPkgExpiryDate });
      }
    });
    return alerts.sort((a, b) => new Date(a.date) - new Date(b.date));
  }, [vehicles]);

  const pendingTasks = useMemo(() => {
    return (reminders || [])
      .filter(r => r.status !== 'completed')
      .map(r => {
        const v = vehicles.find(veh => veh.id === r.vehicleId);
        let urgency = 0; 
        let isOverdue = false;
        let metricStr = '';

        if (r.type === 'odometer') {
          const diff = r.dueOdometer - (v?.currentOdometer || 0);
          urgency = diff; // lower is closer/overdue
          isOverdue = diff <= 0;
          metricStr = `${v?.currentOdometer || 0} / ${r.dueOdometer} km`;
        } else {
          const diffDays = Math.ceil((new Date(r.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
          urgency = diffDays;
          isOverdue = diffDays <= 0;
          metricStr = formatDate(r.dueDate);
        }
        return { ...r, vehicle: v, urgency, isOverdue, metricStr };
      })
      .sort((a, b) => a.urgency - b.urgency); // Sort most urgent first
  }, [reminders, vehicles]);

  const completeTask = (taskId) => {
    setReminders(prev => prev.map(r => r.id === taskId ? { ...r, status: 'completed' } : r));
    showToast('Task marked as completed!');
  };

  const allSearchTerms = useMemo(() => {
    const terms = new Set();
    vehicles.forEach(v => { terms.add(v.model); terms.add(v.number); });
    maintenance.forEach(m => {
      terms.add(m.type + ' Service');
      m.parts.forEach(p => { terms.add(p.name); if (p.specification) terms.add(p.specification); });
    });
    (consumables || []).forEach(c => { terms.add(c.type); });
    return Array.from(terms).filter(Boolean);
  }, [vehicles, maintenance, consumables]);

  const searchSuggestions = useMemo(() => {
    if (!searchQuery) return [];
    const lowerQ = searchQuery.toLowerCase();
    return allSearchTerms.filter(term => term.toLowerCase().includes(lowerQ)).slice(0, 6);
  }, [searchQuery, allSearchTerms]);

  const searchResults = useMemo(() => {
    if (!activeSearch) return null;
    const term = activeSearch.toLowerCase();
    const results = [];

    vehicles.forEach(v => {
      const matchedMaint = maintenance.filter(m => 
        m.vehicleId === v.id && 
        (m.type.toLowerCase().includes(term) || 
         m.parts.some(p => p.name.toLowerCase().includes(term) || (p.specification && p.specification.toLowerCase().includes(term)) || (p.comments && p.comments.toLowerCase().includes(term))))
      ).sort((a, b) => new Date(b.date) - new Date(a.date));

      const matchedCons = (consumables || []).filter(c => 
        c.vehicleId === v.id && 
        (c.type.toLowerCase().includes(term) || (c.notes && c.notes.toLowerCase().includes(term)))
      ).sort((a, b) => new Date(b.date) - new Date(a.date));

      const vMatch = v.model.toLowerCase().includes(term) || v.number.toLowerCase().includes(term) || v.classification.toLowerCase().includes(term);

      const isChainSearch = term.includes('chain') || term.includes('lube');
      const isWashSearch = term.includes('wash') || term.includes('clean');
      const isApplicable = (isChainSearch && v.type === '2W' && v.classification === 'Bike') || isWashSearch || vMatch;

      if (matchedMaint.length > 0 || matchedCons.length > 0 || isApplicable) {
        results.push({
          vehicle: v,
          latestMaint: matchedMaint[0],
          latestCons: matchedCons[0],
          totalMatches: matchedMaint.length + matchedCons.length,
          isPending: matchedMaint.length === 0 && matchedCons.length === 0
        });
      }
    });
    return results;
  }, [activeSearch, vehicles, maintenance, consumables]);

  const handleSearchSubmit = (e) => {
    e?.preventDefault();
    if (searchQuery.trim()) { setActiveSearch(searchQuery.trim()); setIsSearchFocused(false); }
  };

  return (
    <div className="space-y-8 animate-fade-in-up">
      
      <HeroHeader 
        t={t}
        title="Telemetry Dashboard"
        subtitle="Complete fleet overview at a glance"
        icon={GlowingPulseIcon}
        iconClass="animate-hero-dash"
        actionLabel="Onboard Vehicle"
        actionIcon={Plus}
        onAction={() => navigateTo('add-vehicle')}
      />

      <div className="flex justify-end -mt-4 relative z-20">
          <div className="w-full sm:w-96 relative group min-w-0">
            <form onSubmit={handleSearchSubmit} className="relative">
              <Search className={`absolute left-4 top-1/2 -translate-y-1/2 transition-colors z-10 flex-shrink-0 ${t.muted}`} size={20} />
              <input 
                type="text" placeholder="Search parts, logs, tags..." value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)} onFocus={() => setIsSearchFocused(true)} onBlur={() => setTimeout(() => setIsSearchFocused(false), 200)}
                className={`w-full rounded-2xl pl-12 pr-12 py-3.5 border focus:outline-none transition-all shadow-lg font-medium truncate ${t.input}`}
              />
              {searchQuery && (
                <button type="button" onClick={() => {setSearchQuery(''); setActiveSearch('');}} className={`absolute right-4 top-1/2 -translate-y-1/2 ${t.muted} hover:opacity-70 flex-shrink-0`}>
                  <X size={16} />
                </button>
              )}
            </form>
            {/* Search Suggestions */}
            {isSearchFocused && searchSuggestions.length > 0 && (
              <div className={`absolute top-full mt-3 left-0 right-0 rounded-2xl border overflow-hidden z-50 animate-fade-in ${t.card}`}>
                {searchSuggestions.map((suggestion, idx) => (
                  <button 
                    key={idx} onMouseDown={() => { setSearchQuery(suggestion); setActiveSearch(suggestion); setIsSearchFocused(false); }}
                    className={`w-full text-left px-5 py-3.5 text-sm font-medium transition-colors flex items-center gap-3 border-b last:border-0 ${t.border} ${t.cardHover}`}
                  >
                    <div className={`p-1.5 rounded-lg flex-shrink-0 ${t.iconBg}`}><Search size={14} /></div>
                    <span className="truncate">{suggestion}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
      </div>

      {activeSearch ? (
        <div className="animate-fade-in space-y-6">
          <div className={`px-6 py-4 rounded-2xl border flex items-center justify-between min-w-0 ${t.card}`}>
            <div className={`flex items-center gap-3 font-bold text-lg min-w-0 ${t.accent}`}>
              <Search size={22} className="flex-shrink-0" /> <span className="truncate">Results for "{activeSearch}"</span>
            </div>
            <span className={`text-sm font-bold px-3 py-1.5 rounded-xl shadow-inner border flex-shrink-0 ml-4 ${t.iconBg}`}>
              {searchResults.length} matches
            </span>
          </div>

          {searchResults.length === 0 ? (
            <div className={`text-center py-24 rounded-3xl border-dashed border-2 min-w-0 ${t.card}`}>
              <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ${t.iconBg}`}>
                 <Search size={36} />
              </div>
              <h3 className="text-2xl font-black mb-2">No records found</h3>
              <p className={`font-bold ${t.muted}`}>Adjust your search terms to try again.</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {searchResults.map((res, i) => {
                const latestRecordDate = res.latestMaint?.date || res.latestCons?.date;
                const latestCost = res.latestMaint?.totalCost || res.latestCons?.cost || 0;
                
                return (
                  <div key={i} style={{ animationDelay: `${i * 0.1}s` }} onClick={() => navigateTo('vehicle-details', res.vehicle.id)} className={`animate-fade-in-up border p-6 rounded-3xl cursor-pointer group transition-all flex flex-col min-w-0 ${t.card} ${t.cardHover}`}>
                    <div className="flex justify-between items-start mb-6 gap-4 min-w-0">
                      <div className="flex items-center gap-4 min-w-0">
                        <div className={`p-3 rounded-2xl shadow-md group-hover:scale-110 transition-all duration-300 flex-shrink-0 ${t.iconBg}`}>
                          <VehicleIcon classification={res.vehicle.classification} type={res.vehicle.type} size={32} />
                        </div>
                        <div className="min-w-0">
                          <h3 className={`font-bold text-xl transition-colors truncate group-hover:${t.accent}`}>{res.vehicle.number}</h3>
                          <p className={`text-sm font-medium truncate ${t.muted}`}>{res.vehicle.model}</p>
                        </div>
                      </div>
                      <span className={`text-xs font-bold px-3 py-1.5 rounded-xl border flex-shrink-0 ${t.iconBg}`}>
                        {res.totalMatches} events
                      </span>
                    </div>

                    <div className={`rounded-2xl p-5 border shadow-inner mt-auto bg-black/5 ${t.border}`}>
                      {res.isPending ? (
                        <div className="flex items-center gap-3 text-orange-500 bg-orange-500/10 p-3 rounded-xl min-w-0 border border-orange-500/20">
                          <AlertTriangle size={20} className="flex-shrink-0" />
                          <span className="font-bold text-sm truncate">No records logged. Needs attention.</span>
                        </div>
                      ) : (
                        <div className="min-w-0">
                          <p className={`text-xs mb-2 uppercase tracking-widest font-bold truncate ${t.muted}`}>Latest matching log</p>
                          <div className="flex justify-between items-end gap-2">
                            <div className="min-w-0">
                              <p className="font-bold text-lg font-mono tracking-tight truncate">{formatDate(latestRecordDate)}</p>
                              <p className={`text-sm font-medium mt-1 flex items-center gap-2 truncate ${t.muted}`}>
                                <span className="flex-shrink-0">{res.latestMaint ? <Wrench size={14} /> : <Droplet size={14} />}</span>
                                <span className="truncate">{res.latestMaint ? 'Maintenance' : 'Consumable'}</span>
                              </p>
                            </div>
                            <div className={`font-black text-2xl drop-shadow-sm flex-shrink-0 font-mono ${t.accent}`}>
                              {formatCurrency(latestCost)}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ) : (
        <>
          <div className={`grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 ${t.isCompact ? 'gap-4' : 'gap-6'}`}>
            <StatCard t={t} icon={<Car size={t.isCompact ? 24 : 32} />} title="Total Fleet" value={vehicles.length} delay="0s" accent="from-blue-500 to-indigo-500" />
            <StatCard t={t} icon={<Settings size={t.isCompact ? 24 : 32} />} title="Total Logs" value={maintenance.length} delay="0.1s" accent="from-emerald-400 to-teal-500" />
            <StatCard t={t} icon={<IndianRupee size={t.isCompact ? 24 : 32} />} title="Total Expenditure" value={totalExpense} isCurrency delay="0.2s" accent="from-rose-500 to-orange-500" />
            <StatCard t={t} icon={<Target size={t.isCompact ? 24 : 32} />} title="Projected TCO / Yr" value={tcoProjection} isCurrency delay="0.3s" accent="from-purple-500 to-pink-500" />
          </div>

          <div className={`${t.isCompact ? 'mt-4' : 'mt-8'}`}>
             <TelemetryChart vehicles={vehicles} maintenance={maintenance} consumables={consumables} t={t} />
          </div>

          <div className={`grid grid-cols-1 lg:grid-cols-3 ${t.isCompact ? 'gap-4 mt-4' : 'gap-6 mt-8'}`}>
            <div className={`lg:col-span-2 ${t.isCompact ? 'rounded-2xl p-4 md:p-6' : 'rounded-3xl p-6 md:p-8'} animate-fade-in-up border shadow-lg relative overflow-hidden ${t.card}`} style={{animationDelay: '0.3s'}}>
              {/* Sporty background pattern */}
              {!t.isCompact && <div className="absolute top-0 right-0 w-64 h-64 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDEiLz4KPHBhdGggZD0iTTAgMEw4IDhaTTAgOEw4IDBaIiBzdHJva2U9IiNmZmYiIHN0cm9rZS1vcGFjaXR5PSIwLjA0IiBzdHJva2Utd2lkdGg9IjEiLz4KPC9zdmc+')] opacity-50 pointer-events-none transform rotate-12 scale-150"></div>}

              <h2 className={`${t.isCompact ? 'mb-4' : 'mb-8'} text-xl font-black flex flex-col sm:flex-row sm:items-center justify-between gap-4 relative z-10`}>
                <div className="flex items-center gap-3">
                  <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 ${t.iconBg}`}><GlowingGaugeIcon size={22} /></div>
                  Fleet Cost Telemetry
                </div>
                <div className="flex gap-4 bg-black/5 dark:bg-white/5 px-4 py-2 rounded-xl border border-current border-opacity-10 shadow-inner">
                   <span className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest opacity-80"><div className="w-2.5 h-2.5 rounded-sm shadow-inner bg-gradient-to-br from-blue-500 to-indigo-500 transform -skew-x-12"></div> Maintenance</span>
                   <span className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest opacity-80"><div className="w-2.5 h-2.5 rounded-sm shadow-inner bg-gradient-to-br from-teal-400 to-emerald-400 transform -skew-x-12"></div> Consumables</span>
                </div>
              </h2>
              {vehicles.length === 0 ? (
                <div className={`text-center py-12 font-medium rounded-2xl border border-dashed relative z-10 ${t.border} ${t.muted}`}>No vehicles tracked yet.</div>
              ) : (
                <div className={`relative z-10 ${t.isCompact ? 'space-y-3' : 'space-y-5'}`}>
                  {vehicles.map((vehicle, idx) => {
                    const expObj = vehicleExpenses[vehicle.id] || { total: 0, maint: 0, cons: 0 };
                    const expense = expObj.total;
                    const percentage = totalExpense > 0 ? (expense / totalExpense) * 100 : 0;
                    const maintPct = expense > 0 ? (expObj.maint / expense) * 100 : 0;
                    const consPct = expense > 0 ? (expObj.cons / expense) * 100 : 0;
                    const costPerKm = vehicle.currentOdometer > 0 ? (expense / vehicle.currentOdometer).toFixed(2) : '0.00';
                    
                    // Dynamic accent colors based on index to make each card uniquely sporty
                    const ACCENT_COLORS = ['from-blue-500 to-cyan-400', 'from-emerald-400 to-teal-500', 'from-rose-500 to-orange-500', 'from-purple-500 to-pink-500', 'from-amber-400 to-yellow-500'];
                    const cardAccent = ACCENT_COLORS[idx % ACCENT_COLORS.length];

                    return (
                      <div key={vehicle.id} style={{ animationDelay: `${idx * 0.1 + 0.4}s` }} onClick={() => navigateTo('vehicle-details', vehicle.id)} className={`animate-fade-in-up group cursor-pointer ${t.isCompact ? 'p-3 rounded-xl gap-3' : 'p-5 rounded-2xl gap-5'} border transition-all duration-500 flex flex-col min-w-0 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 ${t.border} hover:border-transparent hover:shadow-[0_15px_30px_rgba(0,0,0,0.15)] dark:hover:shadow-[0_15px_30px_rgba(255,255,255,0.05)] relative overflow-hidden transform hover:-translate-y-1.5 hover:scale-[1.01]`}>
                        
                        {/* Background Ambient Glow & Telemetry Speed Lines */}
                        <div className={`absolute inset-0 bg-gradient-to-br ${cardAccent} opacity-0 group-hover:opacity-[0.05] transition-opacity duration-700 pointer-events-none`}></div>
                        
                        <div className="absolute inset-y-0 right-0 w-2/3 opacity-0 group-hover:opacity-10 transition-all duration-700 pointer-events-none flex flex-col justify-evenly overflow-hidden" style={{ maskImage: 'linear-gradient(to right, transparent, black)' }}>
                           <div className="w-full h-[1px] bg-current transform translate-x-full group-hover:translate-x-0 transition-transform duration-1000 ease-out"></div>
                           <div className="w-full h-[1px] bg-current transform translate-x-full group-hover:translate-x-0 transition-transform duration-[1.2s] ease-out delay-75"></div>
                           <div className="w-full h-[1px] bg-current transform translate-x-full group-hover:translate-x-0 transition-transform duration-[0.8s] ease-out delay-150"></div>
                        </div>

                        {/* High-speed Expanding Side Border */}
                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b ${cardAccent} transform scale-y-0 group-hover:scale-y-100 transition-transform duration-500 ease-out origin-bottom`}></div>

                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 relative z-10">
                          <div className="flex items-center gap-4 min-w-0 flex-1">
                            <div className={`relative ${t.isCompact ? 'p-2 rounded-xl' : 'p-3 rounded-2xl'} shadow-xl transition-all duration-500 flex-shrink-0 border bg-white:bg-slate-800 ${t.border} ${t.accent} group-hover:rotate-12 group-hover:scale-110 group-hover:shadow-2xl`}>
                              {/* Pulsing rings around the icon */}
                              <div className={`absolute inset-0 border-2 ${t.isCompact ? 'rounded-xl' : 'rounded-2xl'} opacity-0 group-hover:opacity-100 group-hover:animate-ping pointer-events-none border-current`}></div>
                              <VehicleIcon classification={vehicle.classification} type={vehicle.type} size={t.isCompact ? 24 : 32} />
                            </div>
                            <div className="min-w-0 flex-1 transform group-hover:translate-x-2 transition-transform duration-500">
                              <h4 className={`font-bold transition-colors text-lg truncate group-hover:${t.accent} uppercase tracking-tight`}>{vehicle.model}</h4>
                              <div className={`flex flex-wrap items-center gap-2 text-xs mt-1.5 font-medium ${t.muted}`}>
                                <span className={`px-2 py-0.5 rounded shadow-inner border tracking-wider truncate max-w-[150px] font-mono bg-black/10 dark:bg-white/10 ${t.border} group-hover:border-current transition-colors`}>{vehicle.number}</span>
                                <span className="flex-shrink-0 opacity-40 text-lg leading-none">•</span>
                                <span className="flex items-center gap-1.5 whitespace-nowrap flex-shrink-0 font-mono"><Gauge size={14} className="opacity-70 flex-shrink-0 text-orange-500"/> {costPerKm} ₹/km</span>
                              </div>
                            </div>
                          </div>
                          
                          <div className="text-left sm:text-right flex-shrink-0 flex sm:block items-center justify-between w-full sm:w-auto transform group-hover:-translate-x-2 transition-transform duration-500">
                            <div className="font-black text-2xl drop-shadow-md font-mono"><AnimatedCounter value={expense} isCurrency /></div>
                            <div className={`text-[10px] mt-1 font-bold uppercase font-mono tracking-widest opacity-60 group-hover:opacity-100 transition-opacity flex items-center gap-2 sm:justify-end`}>
                               <Zap size={12} className="text-yellow-500" /> {percentage.toFixed(1)}% Fleet Share
                            </div>
                          </div>
                        </div>

                        {/* Sporty Segmented Progress Bar */}
                        <div className="relative pt-2 z-10">
                           <div className={`absolute inset-0 top-2 w-full h-2 rounded-full overflow-hidden shadow-inner bg-black/10 dark:bg-white/10 transform -skew-x-12`}></div>
                           <div className={`relative h-2 rounded-full overflow-hidden flex shadow-lg transform -skew-x-12`} style={{ width: `${percentage}%` }}>
                              <div className="h-full bg-gradient-to-r from-blue-600 to-indigo-500 transition-all duration-1000 ease-out border-r border-black/20" style={{ width: `${maintPct}%` }} title="Maintenance Cost"></div>
                              <div className="h-full bg-gradient-to-r from-teal-400 to-emerald-400 transition-all duration-1000 ease-out" style={{ width: `${consPct}%` }} title="Consumables Cost"></div>
                           </div>
                           <div className="absolute inset-0 top-2 h-2 opacity-0 group-hover:opacity-30 blur-sm transition-opacity duration-500 pointer-events-none transform -skew-x-12 flex" style={{ width: `${percentage}%` }}>
                              <div className="h-full bg-blue-500" style={{ width: `${maintPct}%` }}></div>
                              <div className="h-full bg-teal-400" style={{ width: `${consPct}%` }}></div>
                           </div>
                        </div>
                      </div>
                    );
                  })}

            {/* Side Widgets Wrapper */}

              <div className={`${t.isCompact ? 'rounded-2xl p-4 md:p-6' : 'rounded-3xl p-6 md:p-8'} flex flex-col animate-fade-in-up border shadow-lg ${t.card}`} style={{animationDelay: '0.4s'}}>
                <h2 className={`text-xl font-black ${t.isCompact ? 'mb-4' : 'mb-6'} flex items-center gap-3 text-rose-500 drop-shadow-sm`}>
                  <div className="p-2 bg-rose-500/10 rounded-xl shadow-inner flex-shrink-0 border border-rose-500/20"><ShieldAlert size={22} /></div>
                  Action Required
                </h2>
                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar max-h-[350px]">
                  {expiringAlerts.length === 0 ? (
                    <div className={`text-center py-10 font-bold rounded-2xl shadow-inner border border-dashed flex flex-col items-center ${t.border} ${t.muted}`}>
                      <div className="w-12 h-12 bg-emerald-500/10 border border-emerald-500/20 rounded-full flex items-center justify-center mb-4 shadow-inner flex-shrink-0 text-emerald-500">
                         <CheckCircle2 size={24} />
                      </div>
                      <p className="text-sm">All clear! Fleet is up to date.</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {expiringAlerts.map((alert, idx) => (
                        <div key={idx} onClick={() => navigateTo('vehicle-details', alert.id)} className={`p-4 rounded-2xl border cursor-pointer transition-all hover:-translate-y-1 hover:shadow-lg active:scale-[0.98] min-w-0 bg-black/10 ${alert.status === 'Expired' ? 'border-rose-500/30 hover:border-rose-500/60 shadow-rose-500/10' : 'border-orange-500/30 hover:border-orange-500/60 shadow-orange-500/10'}`}>
                          <div className="flex items-start gap-4 min-w-0">
                            <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 border ${alert.status === 'Expired' ? 'bg-rose-500/10 border-rose-500/20 text-rose-500' : 'bg-orange-500/10 border-orange-500/20 text-orange-500'}`}>
                               <AlertTriangle size={20} />
                            </div>
                            <div className="min-w-0 flex-1">
                              <h4 className={`font-bold text-sm truncate tracking-wide ${alert.status === 'Expired' ? 'text-rose-500' : 'text-orange-500'}`}>
                                {alert.name}
                              </h4>
                              <p className={`font-medium text-[10px] mt-1 truncate uppercase tracking-widest ${t.muted}`}>
                                {alert.type} • {alert.status}
                              </p>
                              <p className="text-xs font-bold font-mono mt-1 flex items-center gap-1.5 truncate">
                                <Calendar size={12} className="flex-shrink-0"/> {formatDate(alert.date)}
                              </p>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>

              {/* Upcoming Tasks */}
              <div className={`${t.isCompact ? 'rounded-2xl p-4 md:p-6' : 'rounded-3xl p-6 md:p-8'} flex flex-col animate-fade-in-up border shadow-lg ${t.card}`} style={{animationDelay: '0.5s'}}>
                <div className={`flex items-center justify-between gap-4 ${t.isCompact ? 'mb-4' : 'mb-6'}`}>
                  <h2 className="text-xl font-black flex items-center gap-3 text-purple-500 drop-shadow-sm min-w-0">
                    <div className="p-2 bg-purple-500/10 rounded-xl shadow-inner flex-shrink-0 border border-purple-500/20"><Clock size={22} /></div>
                    <span className="truncate">Upcoming Tasks</span>
                  </h2>
                  <button onClick={() => navigateTo('add-reminder')} className={`p-2 rounded-xl shadow-sm border transition-all hover:scale-105 active:scale-95 text-purple-500 bg-purple-500/5 hover:bg-purple-500/10 border-purple-500/20 flex-shrink-0`} title="Schedule Task">
                    <Plus size={18} />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar max-h-[350px]">
                  {pendingTasks.length === 0 ? (
                    <div className={`text-center py-10 font-bold rounded-2xl shadow-inner border border-dashed flex flex-col items-center ${t.border} ${t.muted}`}>
                      <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-4 shadow-inner flex-shrink-0 border ${t.iconBg}`}>
                         <Bell size={24} className="opacity-50" />
                      </div>
                      <p className="text-sm">No scheduled maintenance.</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {pendingTasks.map((task, idx) => (
                        <div key={task.id} className={`p-4 rounded-2xl border transition-all min-w-0 bg-black/5 hover:bg-black/10 dark:hover:bg-white/5 ${task.isOverdue ? 'border-rose-500/50 shadow-[0_0_10px_rgba(225,29,72,0.1)]' : t.border}`}>
                          <div className="flex flex-col gap-3 min-w-0">
                             <div className="flex items-start justify-between gap-2 min-w-0">
                               <div className="min-w-0 flex-1">
                                 <h4 className={`font-bold text-sm truncate tracking-wide ${task.isOverdue ? 'text-rose-500' : t.accent}`} title={task.title}>{task.title}</h4>
                                 <span className={`text-[10px] font-black tracking-widest uppercase truncate mt-0.5 block ${t.muted}`}>
                                   {task.vehicle ? `${task.vehicle.number} • ${task.vehicle.model}` : 'Unknown Vehicle'}
                                 </span>
                               </div>
                               <button onClick={() => completeTask(task.id)} className={`p-1.5 rounded-lg border shadow-sm transition-all hover:scale-110 active:scale-95 flex-shrink-0 bg-emerald-500/10 border-emerald-500/30 text-emerald-600 hover:bg-emerald-500 hover:text-white`} title="Mark Completed">
                                  <CheckCircle2 size={16} />
                               </button>
                             </div>
                             
                             <div className={`flex items-center gap-2 px-3 py-2 rounded-xl shadow-inner border text-xs font-mono font-bold w-fit ${task.isOverdue ? 'bg-rose-500/10 text-rose-600 border-rose-500/20' : `bg-black/10 dark:bg-white/10 ${t.border} ${t.muted}`}`}>
                               {task.type === 'odometer' ? <Activity size={12} className="flex-shrink-0"/> : <Calendar size={12} className="flex-shrink-0"/>}
                               <span className="truncate">{task.metricStr}</span>
                               {task.isOverdue && <span className="uppercase text-[9px] tracking-widest ml-1 animate-pulse">- Overdue</span>}
                             </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function TelemetryChart({ vehicles, maintenance, consumables, t }) {
  const [hoverPoint, setHoverPoint] = useState(null);
  const [visibleVehicles, setVisibleVehicles] = useState(() => new Set(vehicles.map(v => v.id)));

  useEffect(() => {
    setVisibleVehicles(prev => {
      const next = new Set(prev);
      vehicles.forEach(v => next.add(v.id));
      return next;
    });
  }, [vehicles.length]);

  const handleLegendClick = (id) => {
    setVisibleVehicles(prev => {
      if (prev.size === vehicles.length) return new Set([id]);
      if (prev.has(id) && prev.size === 1) return new Set(vehicles.map(v => v.id));
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next.size === 0 ? new Set(vehicles.map(v => v.id)) : next;
    });
  };

  const chartData = useMemo(() => {
    const yearSet = new Set();
    const vData = {};

    vehicles.forEach(v => {
      vData[v.id] = { number: v.number, model: v.model, yearly: {} };
    });

    maintenance.forEach(m => {
      if(!vData[m.vehicleId]) return;
      const yr = new Date(m.date).getFullYear();
      if(isNaN(yr)) return;
      yearSet.add(yr);
      
      if(!vData[m.vehicleId].yearly[yr]) vData[m.vehicleId].yearly[yr] = { parts: 0, labor: 0, cons: 0, total: 0 };
      const labor = Number(m.laborCost) || 0;
      const parts = m.parts.reduce((sum, p) => sum + (Number(p.cost) || 0), 0);
      vData[m.vehicleId].yearly[yr].labor += labor;
      vData[m.vehicleId].yearly[yr].parts += parts;
      vData[m.vehicleId].yearly[yr].total += (labor + parts);
    });

    (consumables || []).forEach(c => {
      if(!vData[c.vehicleId]) return;
      const yr = new Date(c.date).getFullYear();
      if(isNaN(yr)) return;
      yearSet.add(yr);

      if(!vData[c.vehicleId].yearly[yr]) vData[c.vehicleId].yearly[yr] = { parts: 0, labor: 0, cons: 0, total: 0 };
      const cost = Number(c.cost) || 0;
      vData[c.vehicleId].yearly[yr].cons += cost;
      vData[c.vehicleId].yearly[yr].total += cost;
    });

    if(yearSet.size === 0) yearSet.add(new Date().getFullYear());

    const sortedYears = Array.from(yearSet).sort();
    const minYr = sortedYears[0];
    const maxYr = sortedYears[sortedYears.length - 1];
    
    const fullYears = [];
    for(let y = minYr; y <= Math.max(minYr, maxYr); y++) fullYears.push(y);

    vehicles.forEach(v => {
      fullYears.forEach(y => {
        if(!vData[v.id].yearly[y]) vData[v.id].yearly[y] = { parts: 0, labor: 0, cons: 0, total: 0 };
      });
    });

    vehicles.forEach(v => {
      let runningParts = 0;
      let runningLabor = 0;
      let runningCons = 0;
      let runningTotal = 0;

      fullYears.forEach(y => {
        runningParts += vData[v.id].yearly[y].parts;
        runningLabor += vData[v.id].yearly[y].labor;
        runningCons += vData[v.id].yearly[y].cons;
        runningTotal += vData[v.id].yearly[y].total;

        vData[v.id].yearly[y] = {
          parts: runningParts,
          labor: runningLabor,
          cons: runningCons,
          total: runningTotal
        };
      });
    });

    return { fullYears, vData };
  }, [vehicles, maintenance, consumables]);

  const { fullYears, vData } = chartData;

  const maxTotal = useMemo(() => {
    let max = 0;
    vehicles.forEach(v => {
      if (!visibleVehicles.has(v.id)) return;
      fullYears.forEach(y => {
        max = Math.max(max, vData[v.id].yearly[y].total);
      });
    });
    return max === 0 ? 1000 : max * 1.1; 
  }, [chartData, visibleVehicles, vehicles]);

  const CHART_COLORS = ['#3b82f6', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16'];

  const W = 1000;
  const H = 340;
  const padding = { t: 20, b: 40, l: 80, r: 20 };
  const innerW = W - padding.l - padding.r;
  const innerH = H - padding.t - padding.b;

  const getX = (index) => padding.l + (fullYears.length > 1 ? (index / (fullYears.length - 1)) * innerW : innerW / 2);
  const getY = (val) => padding.t + innerH - (maxTotal ? (val / maxTotal) * innerH : 0);
  const getPct = (part, total) => total > 0 ? ((part / total) * 100).toFixed(0) : 0;

  return (
    <div className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-lg w-full ${t.card} relative overflow-hidden animate-fade-in-up`} style={{animationDelay: '0.25s'}}>
      {/* Sporty Texture Background */}
      <div className="absolute inset-0 opacity-[0.04] pointer-events-none bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,currentColor_10px,currentColor_12px)] mix-blend-overlay"></div>
      <div className="absolute -bottom-24 -right-24 w-96 h-96 bg-current opacity-5 rounded-full blur-3xl pointer-events-none"></div>

      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 relative z-10">
        <h2 className="text-xl font-black flex items-center gap-3">
          <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 ${t.iconBg}`}><GlowingPulseIcon size={22} /></div>
          Expenditure Trends
        </h2>

        <div className="flex flex-wrap items-center gap-2">
           {vehicles.map((v, i) => {
             const color = CHART_COLORS[i % CHART_COLORS.length];
             const isActive = visibleVehicles.has(v.id);
             return (
               <button key={v.id} onClick={() => handleLegendClick(v.id)} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg border text-[11px] uppercase tracking-widest font-black transition-all active:scale-95 ${isActive ? 'bg-black/10 dark:bg-white/10 shadow-inner opacity-100' : 'opacity-40 hover:opacity-70'} ${t.border}`}>
                  <div className="w-2.5 h-2.5 rounded-full shadow-inner border border-white/20" style={{backgroundColor: color}}></div>
                  {v.model}
               </button>
             )
           })}
        </div>
      </div>

      <div className="relative w-full" onMouseLeave={() => setHoverPoint(null)}>
        <svg key={Array.from(visibleVehicles).sort().join('-')} viewBox={`0 0 ${W} ${H}`} className="w-full h-auto overflow-visible font-mono text-xs">
          {fullYears.map((yr, idx) => {
            const x = getX(idx);
            return (
              <line key={`vg-${yr}`} x1={x} y1={padding.t} x2={x} y2={padding.t + innerH} stroke="currentColor" strokeOpacity="0.1" strokeWidth="1" strokeDasharray="4 4" />
            );
          })}

          {[0, 0.25, 0.5, 0.75, 1].map(pct => {
            const y = padding.t + innerH * (1 - pct);
            const val = maxTotal * pct;
            return (
              <g key={`hg-${pct}`}>
                <line x1={padding.l} y1={y} x2={W - padding.r} y2={y} stroke="currentColor" strokeOpacity="0.1" strokeDasharray="4 4" />
                <text x={padding.l - 10} y={y + 4} fill="currentColor" opacity="0.5" textAnchor="end">{formatCurrency(val)}</text>
              </g>
            )
          })}
          
          {fullYears.map((yr, idx) => {
            const x = getX(idx);
            const isActiveCol = hoverPoint?.idx === idx;
            return (
              <g key={`ax-${yr}`}>
                <text x={x} y={H - 5} fill="currentColor" opacity={isActiveCol ? "1" : "0.5"} fontWeight={isActiveCol ? "bold" : "normal"} textAnchor="middle" className="transition-all duration-300 text-sm">{yr}</text>
                
                {isActiveCol && (
                  <line x1={x} y1={padding.t} x2={x} y2={H - padding.b} stroke="currentColor" strokeOpacity="0.4" strokeWidth="2" strokeDasharray="4 4" />
                )}
              </g>
            )
          })}

          <g>
            <defs>
              {vehicles.map((v) => {
                 if (!visibleVehicles.has(v.id)) return null;
                 const points = fullYears.map((yr, idx) => `${getX(idx)},${getY(vData[v.id].yearly[yr].total)}`).join(' L ');
                 return (
                   <mask id={`mask-line-${v.id}`} key={`mask-${v.id}`}>
                     <path d={`M ${points}`} fill="none" stroke="white" strokeWidth="20" strokeDasharray="100" strokeDashoffset="100" pathLength="100" className="animate-draw-stroke" strokeLinecap="round" strokeLinejoin="round" />
                   </mask>
                 );
              })}
            </defs>

            {vehicles.map((v, i) => {
               if (!visibleVehicles.has(v.id)) return null;
               const points = fullYears.map((yr, idx) => `${getX(idx)},${getY(vData[v.id].yearly[yr].total)}`).join(' L ');
               const pathData = `M ${points}`;
               const color = CHART_COLORS[i % CHART_COLORS.length];
               return (
                 <g key={v.id}>
                   {/* The masked, animated dashed line */}
                   <path id={`path-${v.id}`} d={pathData} fill="none" stroke={color} strokeWidth="3" strokeDasharray="6 6" mask={`url(#mask-line-${v.id})`} />
                   
                   {/* Driving Car Icon */}
                   <g style={{ color }}>
                     <animateMotion dur="2s" begin="0s" fill="freeze" calcMode="paced">
                       <mpath href={`#path-${v.id}`} />
                     </animateMotion>
                     <svg x="-16" y="-16" width="32" height="32" className="drop-shadow-[0_0_8px_currentColor] transition-transform">
                       <VehicleIcon classification={v.classification} type={v.type} size={32} />
                     </svg>
                   </g>

                   {/* Data points (fade in after the drive completes) */}
                   <g className="animate-fade-in" style={{ animationDelay: '2s', animationFillMode: 'both' }}>
                     {fullYears.map((yr, idx) => {
                       const cx = getX(idx);
                       const cy = getY(vData[v.id].yearly[yr].total);
                       const isHovered = hoverPoint?.idx === idx && hoverPoint?.vId === v.id;
                       return (
                         <g key={yr}>
                           <circle cx={cx} cy={cy} r={isHovered ? 8 : 4} fill={color} stroke={t.bg.includes('black') ? '#000' : '#fff'} strokeWidth="2" className="transition-all duration-300 shadow-md pointer-events-none" />
                           <circle cx={cx} cy={cy} r={24} fill="transparent" onMouseEnter={() => setHoverPoint({ idx, vId: v.id, cx, cy })} className="cursor-crosshair" />
                         </g>
                       );
                     })}
                   </g>
                 </g>
               );
            })}
          </g>
        </svg>

        {hoverPoint !== null && (
          <div 
            className={`absolute pointer-events-none transition-all duration-200 z-50`}
            style={{ 
              left: `${(hoverPoint.cx / W) * 100}%`, 
              top: `${(hoverPoint.cy / H) * 100}%`,
              transform: `translate(${hoverPoint.cx > W / 2 ? '-110%' : '10%'}, -50%)` 
            }}
          >
            <div className={`p-3 sm:p-5 rounded-2xl sm:rounded-3xl border w-max max-w-[220px] sm:max-w-none sm:min-w-[280px] shadow-2xl backdrop-blur-2xl bg-opacity-95 dark:bg-opacity-95 ${t.card}`}>
               <h4 className="font-black text-sm sm:text-lg border-b border-current pb-1.5 sm:pb-2 mb-2 sm:mb-4 opacity-90 uppercase tracking-widest text-center">{fullYears[hoverPoint.idx]} Cumulative</h4>
               <div className="space-y-2 sm:space-y-4">
                 {(() => {
                   const v = vehicles.find(v => v.id === hoverPoint.vId);
                   if (!v || !visibleVehicles.has(v.id)) return null;
                   const color = CHART_COLORS[vehicles.indexOf(v) % CHART_COLORS.length];
                   const data = vData[v.id].yearly[fullYears[hoverPoint.idx]];
                   if (data.total === 0) return <p className="text-[10px] sm:text-xs font-bold opacity-50 italic text-center py-2">No cumulative telemetry logged.</p>;
                   
                   return (
                     <div className="flex flex-col gap-1.5 sm:gap-2 min-w-0 bg-black/5 dark:bg-white/5 p-2 sm:p-3.5 rounded-xl sm:rounded-2xl border border-current border-opacity-10 shadow-sm">
                       <div className="flex items-center justify-between gap-2 sm:gap-4">
                         <div className="flex items-center gap-1.5 sm:gap-2 min-w-0">
                           <div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full shadow-inner flex-shrink-0" style={{backgroundColor: color}}></div>
                           <span className={`font-black text-xs sm:text-sm truncate ${t.accent}`}>{v.model}</span>
                         </div>
                         <span className="font-black font-mono text-xs sm:text-base">{formatCurrency(data.total)}</span>
                       </div>
                       <div className={`flex flex-col gap-1 sm:gap-1.5 text-[8px] sm:text-[10px] font-bold uppercase tracking-widest opacity-80 font-mono pl-4 sm:pl-5 pt-1.5 sm:pt-2 border-t border-current border-opacity-10`}>
                         <div className="flex justify-between items-center"><span className="opacity-70">Parts:</span> <span>{formatCurrency(data.parts)} ({getPct(data.parts, data.total)}%)</span></div>
                         <div className="flex justify-between items-center"><span className="opacity-70">Labor:</span> <span>{formatCurrency(data.labor)} ({getPct(data.labor, data.total)}%)</span></div>
                         <div className="flex justify-between items-center"><span className="opacity-70">Consm:</span> <span>{formatCurrency(data.cons)} ({getPct(data.cons, data.total)}%)</span></div>
                       </div>
                     </div>
                   );
                 })()}
               </div>
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

function StatCard({ t, icon, title, value, isCurrency, delay, accent = "from-blue-500 to-cyan-400" }) {
  return (
    <div style={{ animationDelay: delay }} className={`animate-fade-in-up ${t.isCompact ? 'p-4 rounded-2xl' : 'p-6 rounded-3xl'} transition-all duration-500 hover:-translate-y-2 hover:scale-[1.02] group relative overflow-hidden min-w-0 border shadow-lg cursor-default ${t.card} hover:shadow-2xl`}>
      {/* Sporty animated background effects */}
      <div className={`absolute inset-0 bg-gradient-to-br ${accent} opacity-0 group-hover:opacity-10 transition-opacity duration-500 pointer-events-none`}></div>
      <div className="absolute -right-16 -top-16 w-32 h-32 bg-current opacity-5 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700 pointer-events-none"></div>
      
      {/* Bottom sporty accent line */}
      <div className={`absolute right-0 bottom-0 w-0 group-hover:w-full h-1.5 bg-gradient-to-r ${accent} transition-all duration-700 ease-out`}></div>

      <div className="relative z-10 flex items-center gap-6">
        <div className={`relative ${t.isCompact ? 'p-3 rounded-xl' : 'p-4 rounded-2xl'} shadow-xl transition-all duration-500 z-10 flex-shrink-0 border ${t.iconBg} group-hover:rotate-6 group-hover:shadow-2xl`}>
          <div className={`absolute inset-0 border-2 ${t.isCompact ? 'rounded-xl' : 'rounded-2xl'} opacity-0 group-hover:opacity-100 group-hover:animate-ping pointer-events-none border-current`}></div>
          <div className="transform group-hover:scale-110 transition-transform duration-300">
            {icon}
          </div>
        </div>
        <div className="z-10 min-w-0 flex-1">
          <p className={`text-xs font-bold tracking-widest uppercase truncate transition-colors duration-300 ${t.muted} group-hover:${t.accent}`}>{title}</p>
          <h3 className={`${t.isCompact ? 'text-2xl' : 'text-4xl'} font-black mt-1 drop-shadow-md truncate font-mono tracking-tighter transform group-hover:translate-x-1 transition-transform duration-300`}>
             <AnimatedCounter value={value} isCurrency={isCurrency} />
          </h3>
        </div>
      </div>

      {/* Decorative sporty racing stripes */}
      <div className="absolute top-0 right-0 p-4 opacity-5 flex gap-1.5 transform rotate-12 translate-x-4 -translate-y-4 group-hover:opacity-20 transition-all duration-500 group-hover:translate-x-2 pointer-events-none">
         <div className="w-1.5 h-16 bg-current rounded-full transform -skew-x-12"></div>
         <div className="w-1.5 h-16 bg-current rounded-full transform -skew-x-12 translate-y-2"></div>
         <div className="w-1.5 h-16 bg-current rounded-full transform -skew-x-12 translate-y-4"></div>

}

// 3. Vehicle Form
function VehicleForm({ vehicles, setVehicles, navigateTo, vehicleId, showToast, customOptions, setCustomOptions }) {
  const t = useContext(ThemeContext);
  const isEditing = !!vehicleId;
  const initialData = isEditing ? vehicles.find(v => v.id === vehicleId) : null;

  const [formData, setFormData] = useState(() => {
    if (initialData) {
      return {
        ...initialData,
        // Deep clone nested arrays to prevent mutating the original state reference
        customDetails: Array.isArray(initialData.customDetails) ? initialData.customDetails.map(d => ({ ...d })) : []
      };
    }
    return {
      number: '', model: '', type: '2W', classification: 'Scooty', vehicleCost: '',
      billedDate: '', insuranceDate: '', pollutionDate: '', warrantyYears: '', warrantyDate: '',
      hasMaintPkg: false, maintPkgStartDate: '', maintPkgExpiryDate: '',
      currentOdometer: '', customDetails: []
    };
  });

  useEffect(() => {
    if (formData.billedDate && formData.warrantyYears) {
      const bDate = new Date(formData.billedDate);
      bDate.setFullYear(bDate.getFullYear() + Number(formData.warrantyYears));
      setFormData(prev => ({ ...prev, warrantyDate: bDate.toISOString().split('T')[0] }));
    }
  }, [formData.billedDate, formData.warrantyYears]);

  const handleChange = (e) => { 
    const { name, value, type, checked } = e.target; 
    let finalValue = type === 'checkbox' ? checked : value;
    if (name === 'number') finalValue = finalValue.toUpperCase(); 
    setFormData(prev => ({ ...prev, [name]: finalValue })); 
  };
  
  const handleNumberBlur = () => {
    let stripped = formData.number.replace(/\s+/g, '');
    if (stripped.length >= 8 && stripped.length <= 10) {
       let match = stripped.match(/^([A-Z]{2})(\d{1,2})([A-Z]{1,3})(\d{4})$/);
       if (match) {
           setFormData(p => ({...p, number: `${match[1]} ${match[2]} ${match[3]} ${match[4]}`}));
       }
    }
  };

  const handleTypeChange = (e) => { const newType = e.target.value; setFormData(prev => ({ ...prev, type: newType, classification: newType === '2W' ? 'Scooty' : 'Hatchback' })); };
  const handleCustomDetailChange = (index, field, value) => { 
    setFormData(prev => {
      const newDetails = prev.customDetails.map((detail, i) => i === index ? { ...detail, [field]: value } : detail);
      return { ...prev, customDetails: newDetails };
    });
  };
  const addCustomDetail = () => setFormData(prev => ({ ...prev, customDetails: [...prev.customDetails, { key: '', value: '' }] }));
  const removeCustomDetail = (index) => setFormData(prev => ({ ...prev, customDetails: prev.customDetails.filter((_, i) => i !== index) }));

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!formData.number || !formData.model) return showToast('Please fill required fields', 'error');
    
    // Clean up empty tags before saving
    const cleanedDetails = (formData.customDetails || []).filter(d => d.key.trim() !== '' || d.value.trim() !== '');
    const finalData = { ...formData, customDetails: cleanedDetails };

    if (isEditing) {
      setVehicles(prev => prev.map(v => v.id === vehicleId ? { ...finalData, id: vehicleId } : v));
      showToast('Vehicle configuration updated');
      navigateTo('vehicle-details', vehicleId);
    } else {
      const newVehicle = { ...finalData, id: generateId(), currentOdometer: Number(formData.currentOdometer) || 0 };
      setVehicles(prev => [...prev, newVehicle]);
      showToast('Vehicle successfully onboarded');
      navigateTo('vehicles');
    }
  };

  return (
    <div className="max-w-4xl mx-auto animate-fade-in-up relative z-20 min-w-0">
      <div className="flex items-center gap-4 mb-8 min-w-0">
        <button onClick={() => isEditing ? navigateTo('vehicle-details', vehicleId) : navigateTo('vehicles')} className={`p-2.5 rounded-xl transition-all active:scale-95 flex-shrink-0 border ${t.card} ${t.cardHover}`}>
          <ChevronLeft size={24} />
        </button>
        <h1 className="text-3xl font-black tracking-tight drop-shadow-sm truncate">
          {isEditing ? 'Configure Vehicle' : 'Register Vehicle'}
        </h1>
      </div>

      <form onSubmit={handleSubmit} className={`rounded-3xl overflow-hidden shadow-2xl border min-w-0 ${t.card}`}>
        <div className={`${t.isCompact ? 'p-4 md:p-6 space-y-6' : 'p-6 md:p-10 space-y-10'} min-w-0`}>
          
          <section className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-inner min-w-0 bg-black/5 ${t.border}`}>
            <h3 className={`text-xl font-bold pb-4 ${t.isCompact ? 'mb-4' : 'mb-6'} border-b flex items-center gap-3 uppercase tracking-widest ${t.border}`}>
              <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 border ${t.iconBg}`}><Info size={20} /></div> <span className="truncate">Core Specifications</span>
            </h3>
            <div className={`grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-4' : 'gap-6'} min-w-0`}>
              <div className="space-y-2 w-full min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Registration ID *</label>
                <input 
                  className={`w-full rounded-2xl px-5 py-4 outline-none transition-all font-medium font-mono tracking-widest truncate border uppercase ${t.input}`}
                  name="number" value={formData.number} onChange={handleChange} onBlur={handleNumberBlur} placeholder="MH 12 AB 1234" required
                />
              </div>
              <Input t={t} label="Model Designation *" name="model" value={formData.model} onChange={handleChange} placeholder="e.g. Model S" required />
              
              <div className="space-y-2 min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Chassis Type *</label>
                <div className="flex flex-col sm:flex-row gap-4">
                  <label className={`flex-1 flex items-center justify-center gap-2 p-4 rounded-2xl border-2 cursor-pointer transition-all active:scale-[0.98] ${formData.type === '2W' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : `${t.input}`}`}>
                    <input type="radio" name="type" value="2W" checked={formData.type === '2W'} onChange={handleTypeChange} className="hidden" />
                    <Bike size={20} className="flex-shrink-0" /> <span className="font-bold truncate">2-Wheeler</span>
                  </label>
                  <label className={`flex-1 flex items-center justify-center gap-2 p-4 rounded-2xl border-2 cursor-pointer transition-all active:scale-[0.98] ${formData.type === '4W' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : `${t.input}`}`}>
                    <input type="radio" name="type" value="4W" checked={formData.type === '4W'} onChange={handleTypeChange} className="hidden" />
                    <Car size={20} className="flex-shrink-0" /> <span className="font-bold truncate">4-Wheeler</span>
                  </label>
                </div>
              </div>

              <div className="space-y-2 min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Classification *</label>
                <DynamicSelect 
                  t={t} value={formData.classification} onChange={(val) => handleChange({target: {name: 'classification', value: val}})}
                  defaultOptions={formData.type === '2W' ? ['Scooty', 'Bike'] : ['Hatchback', 'Sedan', 'SUV', 'Pickup']}
                  customKey={formData.type === '2W' ? 'class2W' : 'class4W'}
                  customOptions={customOptions} setCustomOptions={setCustomOptions}
                />
              </div>

              <Input t={t} label="Acquisition Cost" name="vehicleCost" type="number" value={formData.vehicleCost} onChange={handleChange} placeholder="0" />
              <Input t={t} label="Initial Odometer" name="currentOdometer" type="number" value={formData.currentOdometer} onChange={handleChange} placeholder="0" disabled={isEditing} />
            </div>
          </section>

          <section className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-inner min-w-0 bg-black/5 ${t.border}`}>
            <h3 className={`text-xl font-bold pb-4 ${t.isCompact ? 'mb-4' : 'mb-6'} border-b flex items-center gap-3 uppercase tracking-widest ${t.border}`}>
              <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 border ${t.iconBg}`}><Calendar size={20} /></div> <span className="truncate">Compliance Dates</span>
            </h3>
            <div className={`grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-4' : 'gap-6'} min-w-0`}>
              <Input t={t} label="Purchase Date" name="billedDate" type="date" value={formData.billedDate} onChange={handleChange} />
              
              <div className="space-y-2 w-full min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Warranty (Years)</label>
                <input 
                  type="number" min="0" step="0.5" className={`w-full rounded-2xl px-5 py-4 outline-none transition-all font-medium truncate border ${t.input}`}
                  name="warrantyYears" value={formData.warrantyYears} onChange={handleChange} placeholder="e.g. 3" 
                />
                {formData.warrantyDate && (
                   <div className="flex items-center gap-2 mt-2 px-1">
                      <span className={`text-[10px] font-bold uppercase tracking-widest ${t.muted}`}>Calculated Expiry:</span>
                      <span className={`text-sm font-bold font-mono ${t.accent}`}>{formatDate(formData.warrantyDate)}</span>
                   </div>
                )}
              </div>

              <Input t={t} label="Insurance Expiry" name="insuranceDate" type="date" value={formData.insuranceDate} onChange={handleChange} />
              <Input t={t} label="Pollution Expiry" name="pollutionDate" type="date" value={formData.pollutionDate} onChange={handleChange} />
            </div>

            <div className={`${t.isCompact ? 'mt-6 p-4 rounded-xl' : 'mt-8 p-6 rounded-2xl'} border shadow-inner bg-black/10 ${t.border}`}>
              <label className="flex items-center gap-4 cursor-pointer group min-w-0">
                <div className="relative flex items-center justify-center flex-shrink-0">
                   <input type="checkbox" name="hasMaintPkg" checked={formData.hasMaintPkg} onChange={handleChange} className="peer w-6 h-6 opacity-0 absolute cursor-pointer" />
                   <div className={`w-6 h-6 rounded border-2 transition-all shadow-inner peer-checked:bg-current peer-checked:border-current ${t.muted} group-hover:border-current`}></div>
                   <CheckCircle2 size={16} className={`absolute opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none ${t.bg.includes('black') ? 'text-black' : 'text-white'}`} />
                </div>
                <span className={`font-bold uppercase tracking-widest transition-colors truncate text-sm group-hover:${t.accent}`}>Active Maintenance Package</span>
              </label>
              
              {formData.hasMaintPkg && (
                <div className={`grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-4 pt-4 mt-3' : 'gap-6 pt-6 mt-4'} border-t animate-fade-in-up min-w-0 ${t.border}`}>
                  <Input t={t} label="Plan Start" name="maintPkgStartDate" type="date" value={formData.maintPkgStartDate} onChange={handleChange} />
                  <Input t={t} label="Plan Expiry" name="maintPkgExpiryDate" type="date" value={formData.maintPkgExpiryDate} onChange={handleChange} />
                </div>
              )}
            </div>
          </section>

          <section className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-inner min-w-0 bg-black/5 ${t.border}`}>
            <h3 className={`text-xl font-bold pb-4 ${t.isCompact ? 'mb-4' : 'mb-6'} border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4 uppercase tracking-widest ${t.border}`}>
              <div className="flex items-center gap-3 min-w-0">
                 <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 border ${t.iconBg}`}><Settings size={20} /></div> <span className="truncate">Custom Tags</span>
              </div>
              <button type="button" onClick={addCustomDetail} className={`text-sm px-4 py-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 flex-shrink-0 border border-current opacity-80 hover:opacity-100`}>
                <Plus size={16} /> Add Tag
              </button>
            </h3>
            
            {formData.customDetails.length === 0 ? (
               <div className={`text-center py-8 border-2 border-dashed rounded-2xl px-4 ${t.border}`}>
                 <p className={`text-sm font-medium break-words ${t.muted}`}>No custom attributes. Tag chassis, color, variant, etc.</p>
               </div>
            ) : (
              <div className="space-y-4">
                {formData.customDetails.map((detail, idx) => (
                  <div key={idx} className={`flex flex-col sm:flex-row gap-4 items-start ${t.isCompact ? 'p-3 rounded-xl' : 'p-4 rounded-2xl'} border shadow-sm animate-fade-in-up bg-black/10 min-w-0 ${t.border}`}>
                    <div className={`flex-1 grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-3' : 'gap-4'} w-full min-w-0`}>
                      <Input t={t} placeholder="Key (e.g. Color)" value={detail.key} onChange={(e) => handleCustomDetailChange(idx, 'key', e.target.value)} />
                      <Input t={t} placeholder="Value (e.g. Black)" value={detail.value} onChange={(e) => handleCustomDetailChange(idx, 'value', e.target.value)} />
                    </div>
                    <button type="button" onClick={() => removeCustomDetail(idx)} className={`p-3.5 mt-0.5 rounded-xl transition-all shadow-inner flex-shrink-0 w-full sm:w-auto flex justify-center ${t.btnDanger}`}>
                      <Trash2 size={20} />
                    </button>
                  </div>
                ))}
              </div>
            )}
          </section>

        </div>
        
        <div className={`${t.isCompact ? 'px-4 md:px-6 py-4' : 'px-6 md:px-10 py-6'} border-t flex flex-col sm:flex-row justify-end gap-4 bg-black/10 ${t.border}`}>
          <button type="button" onClick={() => isEditing ? navigateTo('vehicle-details', vehicleId) : navigateTo('vehicles')} className={`px-6 ${t.isCompact ? 'py-2.5' : 'py-3.5'} rounded-2xl font-black transition-colors shadow-sm border active:scale-95 flex-shrink-0 ${t.input}`}>
            Abort
          </button>
          <button type="submit" className={`px-8 ${t.isCompact ? 'py-2.5' : 'py-3.5'} rounded-2xl font-black transition-all active:scale-95 flex-shrink-0 border ${t.btnPrimary}`}>
            {isEditing ? 'Compile Changes' : 'Initialize Vehicle'}
          </button>
        </div>
      </form>
    </div>
  );
}

// 4. Vehicle Details
function VehicleDetails({ vehicles, maintenance, vehicleId, navigateTo, setVehicles, setMaintenance, setConsumables, showToast, setConfirmDialog }) {
  const t = useContext(ThemeContext);
  const vehicle = vehicles.find(v => v.id === vehicleId);
  const [renewModal, setRenewModal] = useState({ isOpen: false, field: 'insuranceDate', renewedOn: new Date().toISOString().split('T')[0], years: '1', months: '0' });

  const vehicleMaintenance = maintenance.filter(m => m.vehicleId === vehicleId).sort((a, b) => new Date(b.date) - new Date(a.date));
  const totalSpent = vehicleMaintenance.reduce((sum, m) => sum + Number(m.totalCost), 0);

  // Auto-expand logs on Desktop, collapse all on Mobile
  const [expandedLogs, setExpandedLogs] = useState(() => {
    const isDesktop = typeof window !== 'undefined' && window.innerWidth >= 768;
    return isDesktop ? new Set(vehicleMaintenance.map(m => m.id)) : new Set();
  });

  const [showKeyDates, setShowKeyDates] = useState(() => typeof window !== 'undefined' && window.innerWidth >= 1024);
  const [showSpecifics, setShowSpecifics] = useState(() => typeof window !== 'undefined' && window.innerWidth >= 1024);

  useEffect(() => {
    const isDesktop = typeof window !== 'undefined' && window.innerWidth >= 768;
    const isLgDesktop = typeof window !== 'undefined' && window.innerWidth >= 1024;
    setExpandedLogs(isDesktop ? new Set(vehicleMaintenance.map(m => m.id)) : new Set());
    setShowKeyDates(isLgDesktop);
    setShowSpecifics(isLgDesktop);
  }, [vehicleId]);

  const toggleLog = (id) => {
    setExpandedLogs(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  if (!vehicle) return <div>Vehicle not found</div>;

  const handleDeleteVehicle = () => {
    setConfirmDialog({
      isOpen: true,
      title: 'Purge Vehicle Data',
      message: 'WARNING: Permanently deleting this vehicle will eradicate all linked maintenance and consumable telemetry. Proceed?',
      onConfirm: () => {
        setVehicles(prev => prev.filter(v => v.id !== vehicleId));
        setMaintenance(prev => prev.filter(m => m.vehicleId !== vehicleId));
        setConsumables(prev => prev.filter(c => c.vehicleId !== vehicleId));
        showToast('Vehicle purged from system');
        navigateTo('vehicles');
      }
    });
  };

  const handleDeleteLog = (e, logId) => {
    e.stopPropagation();
    setConfirmDialog({
      isOpen: true, title: 'Erase Log', message: 'Delete this specific telemetry log?',
      onConfirm: () => { setMaintenance(prev => prev.filter(m => m.id !== logId)); showToast('Log erased'); }
    });
  };

  const submitRenew = (e) => {
    e.preventDefault();
    const start = new Date(renewModal.renewedOn);
    start.setFullYear(start.getFullYear() + Number(renewModal.years || 0));
    start.setMonth(start.getMonth() + Number(renewModal.months || 0));
    const newExpiry = start.toISOString().split('T')[0];

    setVehicles(prev => prev.map(v => v.id === vehicleId ? { ...v, [renewModal.field]: newExpiry } : v));
    showToast('Compliance date successfully renewed');
    setRenewModal({ ...renewModal, isOpen: false });
  };

  return (
    <div className="space-y-8 animate-fade-in-up max-w-7xl mx-auto relative z-20">
      
      {renewModal.isOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
          <div className={`border ${t.card} shadow-2xl w-full max-w-md p-8 rounded-3xl transform transition-all animate-fade-in-up relative`}>
            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h3 className="text-2xl font-black mb-6 flex items-center gap-3"><RefreshCw className={t.accent} size={28} /> Renew Compliance</h3>
            <form onSubmit={submitRenew} className="space-y-6">
                <div className="space-y-2">
