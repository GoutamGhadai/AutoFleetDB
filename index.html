function DateRow({ t, label, date, alert, isText }) {
  const expired = alert && !isText && isExpired(date);
  const expiring = alert && !isText && isExpiringSoon(date);
  
  return (
    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center py-2 gap-1 min-w-0">
      <span className={`font-bold text-xs uppercase tracking-widest truncate ${t.muted}`}>{label}</span>
      <div className="text-left sm:text-right min-w-0">
        <div className={`font-black font-mono text-sm truncate ${expired ? 'text-rose-500' : expiring ? 'text-orange-500' : ''}`} title={isText ? date : formatDate(date)}>
          {isText ? date : formatDate(date)}
        </div>
        {(expired || expiring) && (
          <span className={`inline-block mt-1 text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded shadow-inner truncate max-w-full border ${expired ? 'bg-rose-500/10 text-rose-500 border-rose-500/20' : 'bg-orange-500/10 text-orange-500 border-orange-500/20'}`}>
            {expired ? 'Expired' : 'Expiring Soon'}
          </span>
        )}
      </div>
    </div>
  );
}

// 5. Maintenance List Table
function MaintenanceList({ maintenance, vehicles, navigateTo, setMaintenance, showToast, setConfirmDialog }) {
  const t = useContext(ThemeContext);
  
  const [sortOrder, setSortOrder] = useState('desc');
  const [selectedParts, setSelectedParts] = useState(new Set());
  const [isFilterOpen, setIsFilterOpen] = useState(false);

  const togglePart = (part) => {
    setSelectedParts(prev => {
      const next = new Set(prev);
      if (next.has(part)) next.delete(part);
      else next.add(part);
      return next;
    });
  };

  const availableParts = useMemo(() => {
    const partsSet = new Set();
    maintenance.forEach(log => {
      log.parts?.forEach(part => {
        if (part.name) partsSet.add(part.name);
      });
    });
    return Array.from(partsSet).sort();
  }, [maintenance]);

  const processedLogs = useMemo(() => {
    let filtered = [...maintenance];
    if (selectedParts.size > 0) {
      filtered = filtered.filter(log => 
        log.parts?.some(part => selectedParts.has(part.name))
      );
    }
    return filtered.sort((a, b) => {
      const dateA = new Date(a.date);
      const dateB = new Date(b.date);
      return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
    });
  }, [maintenance, sortOrder, selectedParts]);

  const handleDelete = (e, id) => {
    e.stopPropagation();
    setConfirmDialog({
      isOpen: true, title: 'Erase Log', message: 'Permanently erase this specific telemetry record?',
      onConfirm: () => { setMaintenance(prev => prev.filter(m => m.id !== id)); showToast('Log erased'); }
    });
  };

  return (
    <div className="space-y-8 animate-fade-in-up">
      <HeroHeader 
        t={t}
        title="Maintenance Logs"
        subtitle="Global history of all services & repairs"
        icon={Wrench}
        iconClass="animate-hero-wrench"
        actionLabel="Log Event"
        actionIcon={Plus}
        onAction={() => navigateTo('add-maintenance')}
      />

      <div className={`rounded-3xl flex flex-col overflow-hidden min-w-0 border shadow-2xl ${t.card}`}>
        
        {/* Unified Table Header with Controls */}
        {maintenance.length > 0 && (
          <div className={`px-4 sm:px-6 py-4 border-b flex justify-between items-center gap-4 bg-black/10 z-20 ${t.border}`}>
             <span className={`text-xs font-black uppercase tracking-widest flex items-center gap-2 ${t.muted}`}>
                Logs <span className={`px-2 py-0.5 rounded shadow-inner border bg-black/5 ${t.border}`}>{processedLogs.length}</span>
             </span>
             <div className="flex items-center gap-2 relative">
                {/* Sort Button */}
                <button 
                  onClick={() => setSortOrder(prev => prev === 'desc' ? 'asc' : 'desc')} 
                  className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border shadow-sm transition-all active:scale-95 text-[10px] sm:text-xs font-bold uppercase tracking-widest ${t.input} hover:opacity-80`}
                >
                  <Calendar size={14} className={t.accent} />
                  <span className="hidden sm:inline-block">{sortOrder === 'desc' ? 'Newest First' : 'Oldest First'}</span>
                  <ChevronRight size={14} className={`transform transition-transform ${sortOrder === 'desc' ? 'rotate-90' : '-rotate-90'}`} />
                </button>

                {/* Filter Button */}
                <div className="relative">
                    <button 
                      onClick={() => setIsFilterOpen(!isFilterOpen)} 
                      className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border shadow-sm transition-all active:scale-95 text-[10px] sm:text-xs font-bold uppercase tracking-widest ${selectedParts.size > 0 ? t.navActive : t.input} hover:opacity-80`}
                    >
                      <Filter size={14} className={selectedParts.size > 0 ? '' : t.accent} />
                      <span className="hidden sm:inline-block">Filter</span>
                      {selectedParts.size > 0 && <span className="w-4 h-4 rounded-full bg-white text-black flex items-center justify-center text-[9px] shadow-sm">{selectedParts.size}</span>}
                    </button>

                    {/* Filter Popover */}
                    {isFilterOpen && (
                        <>
                           <div className="fixed inset-0 z-40" onClick={() => setIsFilterOpen(false)}></div>
                           <div className={`absolute top-full right-0 mt-2 w-64 max-h-72 overflow-y-auto rounded-2xl border shadow-2xl z-50 p-3 animate-fade-in ${t.card}`}>
                             <div className={`flex justify-between items-center pb-2 mb-2 border-b ${t.border}`}>
                               <span className={`text-[10px] font-black uppercase tracking-widest ${t.muted}`}>Equipments / Parts</span>
                               {selectedParts.size > 0 && <button onClick={() => setSelectedParts(new Set())} className="text-[10px] text-rose-500 font-bold hover:underline">Clear All</button>}
                             </div>
                             <div className="space-y-1">
                               {availableParts.map(part => (
                                 <label key={part} className={`flex items-center gap-3 px-2 py-2 rounded-xl cursor-pointer transition-colors hover:bg-black/5 dark:hover:bg-white/5 group`}>
                                    <div className="relative flex items-center justify-center flex-shrink-0">
                                       <input type="checkbox" checked={selectedParts.has(part)} onChange={() => togglePart(part)} className="peer w-4 h-4 opacity-0 absolute cursor-pointer" />
                                       <div className={`w-4 h-4 rounded border transition-all shadow-inner peer-checked:bg-blue-500 peer-checked:border-blue-500 ${t.border} group-hover:border-blue-400`}></div>
                                       <CheckCircle2 size={12} className={`absolute text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none`} />
                                    </div>
                                    <span className={`text-xs font-bold truncate transition-colors ${selectedParts.has(part) ? t.accent : ''}`} title={part}>{part}</span>
                                 </label>
                               ))}
                               {availableParts.length === 0 && <div className={`text-xs p-3 text-center font-bold ${t.muted}`}>No parts logged yet.</div>}
                             </div>
                           </div>
                        </>
                    )}
                </div>
             </div>
          </div>
        )}

        {processedLogs.length === 0 ? (
           <div className="text-center py-24 px-4">
             <div className={`w-20 h-20 rounded-full flex justify-center items-center mx-auto mb-6 border shadow-inner ${t.iconBg}`}>
                <Wrench size={36} />
             </div>
             <h3 className="text-2xl font-black break-words mb-2">No records found</h3>
             <p className={`font-medium break-words ${t.muted}`}>
               {maintenance.length > 0 ? 'No logs match your selected filter.' : 'Add your first service event to track telemetry.'}
             </p>
           </div>
        ) : (
          <>
            {/* Desktop Table View */}
            <div className="hidden md:block overflow-x-auto custom-scrollbar">
              <table className="w-full text-left border-collapse min-w-[800px]">
                <thead>
                  <tr className={`border-b text-xs font-bold uppercase tracking-widest bg-black/20 ${t.border} ${t.muted}`}>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap`}>Date</th>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap`}>Vehicle</th>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap`}>Class</th>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap`}>Odo</th>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} text-right whitespace-nowrap`}>Cost</th>
                    <th className={`${t.isCompact ? 'p-3' : 'p-5'} text-center whitespace-nowrap`}>Cmd</th>
                  </tr>
                </thead>
                <tbody className={`divide-y bg-black/5 ${t.border}`}>
                  {processedLogs.map((record, idx) => {
                    const vehicle = vehicles.find(v => v.id === record.vehicleId);
                    return (
                      <tr key={record.id} style={{animationDelay: `${idx*0.05}s`}} onClick={() => navigateTo('vehicle-details', record.vehicleId)} className={`animate-fade-in-up transition-colors cursor-pointer group ${t.cardHover}`}>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap font-bold font-mono`}>{formatDate(record.date)}</td>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'} min-w-[200px] max-w-[250px]`}>
                          {vehicle ? (
                            <div className="flex items-center gap-3">
                               <div className={`p-1.5 rounded shadow-inner flex-shrink-0 border group-hover:scale-110 transition-transform ${t.iconBg}`}><VehicleIcon classification={vehicle.classification} type={vehicle.type} size={20} /></div>
                               <div className="min-w-0 flex-1">
                                  <span className={`font-bold block truncate group-hover:${t.accent}`} title={vehicle.number}>{vehicle.number}</span>
                                  <span className={`text-[10px] uppercase tracking-widest font-bold block truncate ${t.muted}`} title={vehicle.model}>{vehicle.model}</span>
                               </div>
                            </div>
                          ) : <span className={`font-medium whitespace-nowrap ${t.muted}`}>Unknown</span>}
                        </td>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'}`}>
                          <span className={`inline-block px-3 py-1 text-[10px] font-bold tracking-widest uppercase rounded-lg shadow-inner border whitespace-nowrap ${t.badgeMaint}`}>
                            {record.type} • {record.serviceCenter || 'Company'}
                          </span>
                        </td>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap text-sm font-bold font-mono ${t.muted}`}>
                          <AnimatedCounter value={record.odometer} isDistance />
                        </td>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap text-right font-black text-lg font-mono ${t.accent}`}>{formatCurrency(record.totalCost)}</td>
                        <td className={`${t.isCompact ? 'p-3' : 'p-5'} whitespace-nowrap`}>
                          <div className="flex justify-center gap-2">
                             <button onClick={(e) => { e.stopPropagation(); navigateTo('add-maintenance', record.vehicleId, null, record.id); }} className={`p-2 rounded-lg transition-all shadow-sm border hover:opacity-70 text-emerald-500 ${t.input}`} title="Clone Record">
                               <Copy size={16} />
                             </button>
                             <button onClick={(e) => { e.stopPropagation(); navigateTo('edit-maintenance', record.vehicleId, record.id); }} className={`p-2 rounded-lg transition-all shadow-sm border hover:opacity-70 ${t.input}`} title="Edit Record">
                               <Edit3 size={16} className={t.accent} />
                             </button>
                             <button onClick={(e) => handleDelete(e, record.id)} className={`p-2 rounded-lg transition-all shadow-sm border hover:opacity-70 text-rose-500 ${t.input}`} title="Delete Record">
                               <Trash2 size={16} />
                             </button>
                          </div>
                        </td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
            </div>

            {/* Mobile Card View */}
            <div className={`md:hidden flex flex-col ${t.isCompact ? 'gap-2 p-2' : 'gap-4 p-4'} bg-black/5`}>
              {processedLogs.map((record, idx) => {
                const vehicle = vehicles.find(v => v.id === record.vehicleId);
                return (
                  <div key={record.id} style={{animationDelay: `${idx*0.05}s`}} onClick={() => navigateTo('vehicle-details', record.vehicleId)} className={`animate-fade-in-up ${t.isCompact ? 'p-3 rounded-xl gap-3' : 'p-4 rounded-2xl gap-4'} border shadow-sm flex flex-col relative cursor-pointer active:scale-[0.98] transition-transform ${t.card}`}>
                    <div className="flex justify-between items-start">
                       <div>
                          <span className="font-black font-mono text-sm">{formatDate(record.date)}</span>
                          <span className={`mt-2 block w-max px-2.5 py-1 text-[10px] font-black tracking-widest uppercase rounded-lg shadow-inner border ${t.badgeMaint}`}>
                            {record.type} • {record.serviceCenter || 'Company'}
                          </span>
                       </div>
                       <div className={`font-black text-xl font-mono ${t.accent}`}>{formatCurrency(record.totalCost)}</div>
                    </div>
                    
                    {vehicle ? (
                      <div className={`flex items-center gap-3 p-3 rounded-xl shadow-inner border border-current border-opacity-10 bg-black/5 dark:bg-white/5`}>
                         <div className={`p-2 rounded-lg shadow-inner flex-shrink-0 border ${t.iconBg}`}>
                           <VehicleIcon classification={vehicle.classification} type={vehicle.type} size={24} />
                         </div>
                         <div className="min-w-0 flex-1">
                            <span className={`font-black block truncate text-base`}>{vehicle.number}</span>
                            <span className={`text-[10px] uppercase tracking-widest font-bold block truncate ${t.muted}`}>{vehicle.model}</span>
                         </div>
                      </div>
                    ) : <span className={`font-medium text-sm ${t.muted}`}>Unknown Vehicle</span>}

                    <div className="flex items-center gap-2">
                       <Activity size={14} className={t.muted} />
                       <span className={`text-sm font-bold font-mono ${t.muted}`}>
                         <AnimatedCounter value={record.odometer} isDistance />
                       </span>
                    </div>

                    <div className={`flex justify-end ${t.isCompact ? 'gap-2 mt-1 pt-3' : 'gap-3 mt-1 pt-4'} border-t border-current border-opacity-10`}>
                       <button onClick={(e) => { e.stopPropagation(); navigateTo('add-maintenance', record.vehicleId, null, record.id); }} className={`p-2 rounded-xl transition-all shadow-sm border hover:opacity-70 text-emerald-500 ${t.input}`} title="Clone Record"><Copy size={18} /></button>
                       <button onClick={(e) => { e.stopPropagation(); navigateTo('edit-maintenance', record.vehicleId, record.id); }} className={`p-2 rounded-xl transition-all shadow-sm border hover:opacity-70 ${t.input}`} title="Edit Record"><Edit3 size={18} className={t.accent} /></button>
                       <button onClick={(e) => handleDelete(e, record.id)} className={`p-2 rounded-xl transition-all shadow-sm border text-rose-500 hover:opacity-70 ${t.input}`} title="Delete Record"><Trash2 size={18} /></button>
                    </div>
                  </div>
                )
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// 6. Maintenance Form
function MaintenanceForm({ vehicles, maintenance, setMaintenance, setVehicles, navigateTo, preselectedVehicleId, editingId, cloneId, showToast, customOptions, setCustomOptions }) {
  const t = useContext(ThemeContext);
  const isEditing = !!editingId;
  const isCloning = !!cloneId;

  const [formData, setFormData] = useState(() => {
    if (isEditing) {
      const rec = maintenance.find(m => m.id === editingId);
      return { 
        ...rec, 
        // Deep clone nested arrays
        parts: Array.isArray(rec.parts) ? rec.parts.map(p => ({ ...p })) : [] 
      };
    }
    if (isCloning) {
      const cloned = maintenance.find(m => m.id === cloneId);
      return { 
        ...cloned, 
        id: undefined, 
        date: new Date().toISOString().split('T')[0], 
        odometer: '', 
        laborCost: cloned.laborCost || '',
        parts: Array.isArray(cloned.parts) ? cloned.parts.map(p => ({ ...p })) : []
      };
    }
    return {
      vehicleId: preselectedVehicleId || (vehicles.length > 0 ? vehicles[0].id : ''),
      date: new Date().toISOString().split('T')[0], type: 'General', serviceCenter: 'Company Authorized', odometer: '', laborCost: '',
      parts: [{ name: '', specification: '', partType: 'Mechanical', cost: '', comments: '' }]
    };
  });

  const handlePartChange = (index, field, value) => { 
    setFormData(prev => {
      const newParts = prev.parts.map((part, i) => i === index ? { ...part, [field]: value } : part);
      return { ...prev, parts: newParts };
    });
  };
  const addPart = () => setFormData(prev => ({ ...prev, parts: [...prev.parts, { name: '', specification: '', partType: 'Mechanical', cost: '', comments: '' }] }));
  const removePart = (index) => setFormData(prev => ({ ...prev, parts: prev.parts.filter((_, i) => i !== index) }));
  const calculateTotal = () => formData.parts.reduce((sum, part) => sum + (Number(part.cost) || 0), 0) + (Number(formData.laborCost) || 0);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!formData.vehicleId) return showToast('Select a vehicle', 'error');

    const totalCost = calculateTotal();
    const newRecord = {
      id: isEditing ? editingId : generateId(),
      vehicleId: formData.vehicleId, date: formData.date, type: formData.type, serviceCenter: formData.serviceCenter || 'Company Authorized',
      odometer: Number(formData.odometer) || 0, totalCost,
      parts: formData.parts.filter(p => p.name.trim() !== '')
    };

    if (isEditing) {
      setMaintenance(prev => prev.map(m => m.id === editingId ? newRecord : m));
      showToast('Telemetry updated');
    } else {
      setMaintenance(prev => [...prev, newRecord]);
      showToast(isCloning ? 'Cloned event logged' : 'Event logged');
    }

    setVehicles(prev => prev.map(v => {
      if (v.id === formData.vehicleId && (!v.currentOdometer || newRecord.odometer > v.currentOdometer)) {
        return { ...v, currentOdometer: newRecord.odometer };
      }
      return v;
    }));
    navigateTo('vehicle-details', formData.vehicleId);
  };

  if (vehicles.length === 0) {
    return (
      <div className={`text-center py-20 rounded-3xl max-w-2xl mx-auto mt-10 px-4 min-w-0 border shadow-2xl ${t.card}`}>
        <h2 className="text-2xl font-black mb-4 break-words">No Vehicles Found</h2>
        <p className={`mb-8 font-bold break-words ${t.muted}`}>You must register a vehicle before logging maintenance.</p>
        <button onClick={() => navigateTo('add-vehicle')} className={`px-8 py-3 rounded-2xl font-black active:scale-95 transition-all ${t.btnPrimary}`}>Register Vehicle</button>
      </div>
    );
  }

  return (
    <div className="max-w-4xl mx-auto animate-fade-in-up relative z-20 min-w-0">
      <div className="flex items-center gap-4 mb-8 min-w-0">
        <button onClick={() => navigateTo(preselectedVehicleId ? 'vehicle-details' : 'maintenance', preselectedVehicleId)} className={`p-2.5 rounded-xl transition-all active:scale-95 flex-shrink-0 border ${t.card} ${t.cardHover}`}>
          <ChevronLeft size={24} />
        </button>
        <h1 className="text-3xl font-black tracking-tight truncate drop-shadow-sm flex items-center gap-3">
          {isEditing ? 'Compile Log' : isCloning ? <><Copy className={t.accent} size={28}/> Clone Maintenance Event</> : 'Log Maintenance Event'}
        </h1>
      </div>

      <form onSubmit={handleSubmit} className={`rounded-3xl overflow-hidden shadow-2xl border min-w-0 ${t.card}`}>
        <div className={`${t.isCompact ? 'p-4 md:p-6 space-y-6' : 'p-6 md:p-10 space-y-10'} min-w-0`}>
          
          <section className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-inner min-w-0 bg-black/5 ${t.border}`}>
            <div className={`grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-4' : 'gap-6'} min-w-0`}>
              <div className="space-y-2 md:col-span-2 min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Target Vehicle *</label>
                <div className="relative">
                  <select 
                    value={formData.vehicleId} onChange={(e) => setFormData(prev => ({ ...prev, vehicleId: e.target.value }))} required
                    className={`w-full rounded-2xl pl-5 pr-12 py-4 appearance-none font-black cursor-pointer text-ellipsis overflow-hidden border transition-all ${t.input}`}
                  >
                    {vehicles.map(v => <option key={v.id} value={v.id}>{v.number} - {v.model}</option>)}
                  </select>
                  <ChevronRight className="absolute right-4 top-1/2 -translate-y-1/2 rotate-90 opacity-50 pointer-events-none flex-shrink-0" size={20} />
                </div>
              </div>

              <Input t={t} label="Event Date *" type="date" value={formData.date} onChange={(e) => setFormData(prev => ({ ...prev, date: e.target.value }))} required />
              <Input t={t} label="Odometer Reading *" type="number" placeholder="0" value={formData.odometer} onChange={(e) => setFormData(prev => ({ ...prev, odometer: e.target.value }))} required />
              
              <div className="space-y-2 md:col-span-2 min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Service Class *</label>
                <div className="flex flex-col sm:flex-row gap-4">
                  <label className={`flex-1 flex items-center justify-center gap-3 p-4 rounded-2xl border-2 cursor-pointer transition-all active:scale-[0.98] ${formData.type === 'General' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : `${t.input}`}`}>
                    <input type="radio" name="m-type" value="General" checked={formData.type === 'General'} onChange={(e) => setFormData(prev => ({ ...prev, type: e.target.value }))} className="hidden" />
                    <span className="font-bold truncate uppercase tracking-widest text-xs">General</span>
                  </label>
                  <label className={`flex-1 flex items-center justify-center gap-3 p-4 rounded-2xl border-2 cursor-pointer transition-all active:scale-[0.98] ${formData.type === 'Customer Requested' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : `${t.input}`}`}>
                    <input type="radio" name="m-type" value="Customer Requested" checked={formData.type === 'Customer Requested'} onChange={(e) => setFormData(prev => ({ ...prev, type: e.target.value }))} className="hidden" />
                    <span className="font-bold truncate uppercase tracking-widest text-xs">Targeted</span>
                  </label>
                </div>
              </div>

              <div className="space-y-2 md:col-span-2 min-w-0">
                <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>Service Center Type *</label>
                <DynamicSelect 
                  t={t} value={formData.serviceCenter || 'Company Authorized'} onChange={(val) => setFormData(prev => ({ ...prev, serviceCenter: val }))}
                  defaultOptions={['Company Authorized', 'Third Party']}
                  customKey="serviceCenters"
                  customOptions={customOptions} setCustomOptions={setCustomOptions}
                />
              </div>
            </div>
          </section>

          <section className={`${t.isCompact ? 'p-4 md:p-5 rounded-2xl' : 'p-6 md:p-8 rounded-3xl'} border shadow-inner min-w-0 bg-black/5 ${t.border}`}>
            <h3 className={`text-xl font-bold pb-4 ${t.isCompact ? 'mb-4' : 'mb-6'} border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4 uppercase tracking-widest ${t.border}`}>
               <div className="flex items-center gap-3 min-w-0">
                 <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 border ${t.iconBg}`}><Wrench size={20} /></div> <span className="truncate">Modifications / Parts</span>
               </div>
               <button type="button" onClick={addPart} className={`text-sm px-4 py-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 flex-shrink-0 border border-current opacity-80 hover:opacity-100`}>
                 <Plus size={16} className="flex-shrink-0" /> Add Part
               </button>
            </h3>

            <div className={`${t.isCompact ? 'space-y-4' : 'space-y-6'} min-w-0`}>
              {formData.parts.map((part, idx) => (
                <div key={idx} className={`flex flex-col xl:flex-row ${t.isCompact ? 'gap-3 p-4 rounded-2xl' : 'gap-4 p-5 rounded-3xl'} items-start border shadow-sm animate-fade-in-up bg-black/10 min-w-0 ${t.border}`}>
                  <div className={`flex-1 grid grid-cols-1 md:grid-cols-2 ${t.isCompact ? 'gap-3' : 'gap-5'} w-full min-w-0`}>
                    <Input t={t} label="Component *" placeholder="e.g. Brake Pads" value={part.name} onChange={(e) => handlePartChange(idx, 'name', e.target.value)} required />
                    <Input t={t} label="Spec" placeholder="e.g. OEM" value={part.specification} onChange={(e) => handlePartChange(idx, 'specification', e.target.value)} />
                    
                    <div className="space-y-2 min-w-0">
                      <label className={`block text-xs font-bold uppercase tracking-widest truncate ${t.muted}`}>System</label>
                      <DynamicSelect 
                        t={t} value={part.partType} onChange={(val) => handlePartChange(idx, 'partType', val)}
                        defaultOptions={['Mechanical', 'Electrical', 'Fluid', 'Other']}
                        customKey="partTypes"
                        customOptions={customOptions} setCustomOptions={setCustomOptions}
                      />
                    </div>

                    <Input t={t} label="Cost (₹) *" type="number" placeholder="0" value={part.cost} onChange={(e) => handlePartChange(idx, 'cost', e.target.value)} required />
                    <div className="md:col-span-2">
                      <Input t={t} label="Notes" placeholder="Additional diagnostics" value={part.comments} onChange={(e) => handlePartChange(idx, 'comments', e.target.value)} />
                    </div>
                  </div>
                  <button type="button" onClick={() => removePart(idx)} className={`p-4 ${t.isCompact ? 'mt-4 xl:mt-6' : 'mt-6 xl:mt-8'} w-full xl:w-auto flex justify-center rounded-2xl transition-all shadow-inner flex-shrink-0 ${t.btnDanger}`} disabled={formData.parts.length === 1}>
                    <Trash2 size={24} className="flex-shrink-0" />
                  </button>
                </div>
              ))}
            </div>
            
            <div className={`${t.isCompact ? 'mt-6' : 'mt-8'} flex justify-end min-w-0`}>

// --- Analytics Chart Builder ---
function ChartBuilder({ vehicles, maintenance, consumables }) {
  const t = useContext(ThemeContext);
  const [chartType, setChartType] = useState('bar'); 
  const [metric, setMetric] = useState('total'); 
  const [dimension, setDimension] = useState('year'); 
  
  const CHART_COLORS = ['#3b82f6', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16'];

  const chartData = useMemo(() => {
    const yearSet = new Set();
    const vData = {}; 

    vehicles.forEach(v => {
      vData[v.id] = { id: v.id, name: `${v.model} (${v.number})`, total: 0, yearly: {} };
    });

    const addVal = (vId, dateStr, val) => {
      if(!vData[vId]) return;
      const yr = new Date(dateStr).getFullYear();
      if(isNaN(yr)) return;
      yearSet.add(yr);
      vData[vId].yearly[yr] = (vData[vId].yearly[yr] || 0) + val;
      vData[vId].total += val;
    };

    maintenance.forEach(m => {
      const partsCost = m.parts.reduce((s, p) => s + (Number(p.cost)||0), 0);
      const laborCost = Number(m.laborCost) || 0;
      const totalMaint = partsCost + laborCost;

      if (metric === 'total' || metric === 'maint') addVal(m.vehicleId, m.date, totalMaint);
      if (metric === 'parts') addVal(m.vehicleId, m.date, partsCost);
      if (metric === 'labor') addVal(m.vehicleId, m.date, laborCost);
    });

    (consumables || []).forEach(c => {
      const cCost = Number(c.cost) || 0;
      if (metric === 'total' || metric === 'cons') addVal(c.vehicleId, c.date, cCost);
    });

    const years = Array.from(yearSet).sort();
    if(years.length === 0) years.push(new Date().getFullYear());

    let labels = [];
    let datasets = [];

    if (dimension === 'year') {
      labels = years.map(String);
      datasets = vehicles.map((v, i) => ({
        id: v.id,
        label: vData[v.id].name,
        color: CHART_COLORS[i % CHART_COLORS.length],
        data: years.map(y => vData[v.id].yearly[y] || 0)
      }));
    } else {
      labels = vehicles.map(v => vData[v.id].name);
      datasets = [{
        id: 'fleet',
        label: 'Fleet Metrics',
        color: CHART_COLORS[0],
        data: vehicles.map(v => vData[v.id].total),
        colors: vehicles.map((v, i) => CHART_COLORS[i % CHART_COLORS.length])
      }];
    }

    return { labels, datasets };
  }, [vehicles, maintenance, consumables, metric, dimension]);

  const insights = useMemo(() => {
    let totalSpent = 0;
    let maintTotal = 0;
    let consTotal = 0;
    let highestSpender = { name: 'N/A', cost: 0, model: '' };
    let totalOdo = 0;

    const vCosts = {};
    vehicles.forEach(v => { vCosts[v.id] = 0; totalOdo += (Number(v.currentOdometer) || 0); });

    maintenance.forEach(m => {
      const c = Number(m.totalCost) || 0;
      totalSpent += c; maintTotal += c;
      if (vCosts[m.vehicleId] !== undefined) vCosts[m.vehicleId] += c;
    });

    (consumables || []).forEach(c => {
      const cost = Number(c.cost) || 0;
      totalSpent += cost; consTotal += cost;
      if (vCosts[c.vehicleId] !== undefined) vCosts[c.vehicleId] += cost;
    });

    vehicles.forEach(v => {
      if (vCosts[v.id] > highestSpender.cost) {
        highestSpender = { name: v.number, cost: vCosts[v.id], model: v.model };
      }
    });

    const costPerKm = totalOdo > 0 ? (totalSpent / totalOdo) : 0;

    return { totalSpent, maintTotal, consTotal, highestSpender, costPerKm };
  }, [vehicles, maintenance, consumables]);

  return (
    <div className="space-y-8 animate-fade-in-up">
      <HeroHeader 
        t={t}
        title="Analytics Builder"
        subtitle="Visualise telemetry & cost reports"
        icon={BarChart2}
        iconClass="animate-hero-chart"
      />

      {/* Analytics Summary Report */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 animate-fade-in-up" style={{animationDelay: '0.1s'}}>
        <div className={`p-5 rounded-2xl border shadow-lg flex flex-col justify-between ${t.card}`}>
           <div className="flex items-center gap-3 mb-4">
             <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 ${t.iconBg}`}><Activity size={18} /></div>
             <span className={`text-xs font-bold uppercase tracking-widest ${t.muted}`}>Total Outlay</span>
           </div>
           <div>
             <h3 className="text-2xl font-black font-mono tracking-tighter">{formatCurrency(insights.totalSpent)}</h3>
             <p className={`text-[10px] uppercase font-bold mt-1 tracking-widest opacity-70`}>Combined Expenditure</p>
           </div>
        </div>
        
        <div className={`p-5 rounded-2xl border shadow-lg flex flex-col justify-between ${t.card}`}>
           <div className="flex items-center gap-3 mb-4">
             <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 ${t.iconBg}`}><Wrench size={18} /></div>
             <span className={`text-xs font-bold uppercase tracking-widest ${t.muted}`}>Maintenance Focus</span>
           </div>
           <div>
             <h3 className="text-2xl font-black font-mono tracking-tighter text-blue-500">{formatCurrency(insights.maintTotal)}</h3>
             <p className={`text-[10px] uppercase font-bold mt-1 tracking-widest opacity-70`}>{insights.totalSpent > 0 ? ((insights.maintTotal / insights.totalSpent) * 100).toFixed(1) : 0}% of Total</p>
           </div>
        </div>

        <div className={`p-5 rounded-2xl border shadow-lg flex flex-col justify-between ${t.card}`}>
           <div className="flex items-center gap-3 mb-4">
             <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 ${t.iconBg}`}><Gauge size={18} /></div>
             <span className={`text-xs font-bold uppercase tracking-widest ${t.muted}`}>Cost Efficiency</span>
           </div>
           <div>
             <h3 className="text-2xl font-black font-mono tracking-tighter text-orange-500">{insights.costPerKm.toFixed(2)} <span className="text-sm">₹/km</span></h3>
             <p className={`text-[10px] uppercase font-bold mt-1 tracking-widest opacity-70`}>Fleet Average</p>
           </div>
        </div>

        <div className={`p-5 rounded-2xl border shadow-lg flex flex-col justify-between ${t.card}`}>
           <div className="flex items-center gap-3 mb-4">
             <div className={`p-2 rounded-xl shadow-inner flex-shrink-0 bg-rose-500/10 text-rose-500 border border-rose-500/20`}><AlertTriangle size={18} /></div>
             <span className={`text-xs font-bold uppercase tracking-widest ${t.muted}`}>Highest Spender</span>
           </div>
           <div>
             <h3 className="text-xl font-bold truncate" title={insights.highestSpender.name}>{insights.highestSpender.name}</h3>
             <p className={`text-[10px] uppercase font-bold mt-1 tracking-widest opacity-70 truncate`}>{insights.highestSpender.model} • {formatCurrency(insights.highestSpender.cost)}</p>
           </div>
        </div>
      </div>

      {/* Chart Controls */}
      <div className={`p-6 rounded-3xl border shadow-lg flex flex-col xl:flex-row gap-6 min-w-0 z-20 relative animate-fade-in-up ${t.card}`} style={{animationDelay: '0.2s'}}>
        <div className="flex-1 space-y-3 min-w-0">
          <label className={`block text-xs font-bold uppercase tracking-widest flex items-center gap-2 ${t.muted}`}><Sliders size={14}/> Visualisation Form</label>
          <div className="flex gap-4">
             <button onClick={()=>setChartType('bar')} className={`flex-1 flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all active:scale-95 ${chartType === 'bar' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : t.input}`}>
               <BarChart2 size={24}/> <span className="text-[10px] font-bold uppercase tracking-widest">Bar</span>
             </button>
             <button onClick={()=>setChartType('line')} className={`flex-1 flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all active:scale-95 ${chartType === 'line' ? `${t.iconBg} border-current shadow-md transform scale-[1.02]` : t.input}`}>
               <LineChart size={24}/> <span className="text-[10px] font-bold uppercase tracking-widest">Line</span>
             </button>
          </div>
        </div>

        <div className="w-px bg-current opacity-10 hidden xl:block"></div>

        <div className="flex-1 space-y-3 min-w-0">
          <label className={`block text-xs font-bold uppercase tracking-widest ${t.muted}`}>Measured Metric</label>
          <div className="relative">
            <select value={metric} onChange={(e)=>setMetric(e.target.value)} className={`w-full rounded-2xl pl-5 pr-12 py-4 appearance-none font-bold cursor-pointer text-ellipsis overflow-hidden border transition-all ${t.input}`}>
              <option value="total">Total Expenditure (Combined)</option>
              <option value="maint">Maintenance Cost Only</option>
              <option value="cons">Consumables Cost Only</option>
              <option value="parts">Parts Cost Only</option>
              <option value="labor">Labor Cost Only</option>
            </select>
            <ChevronRight className="absolute right-4 top-1/2 -translate-y-1/2 rotate-90 opacity-50 pointer-events-none flex-shrink-0" size={20} />
          </div>
        </div>

        <div className="w-px bg-current opacity-10 hidden xl:block"></div>

        <div className="flex-1 space-y-3 min-w-0">
          <label className={`block text-xs font-bold uppercase tracking-widest ${t.muted}`}>Grouping Dimension (X-Axis)</label>
          <div className="relative">
            <select value={dimension} onChange={(e)=>setDimension(e.target.value)} className={`w-full rounded-2xl pl-5 pr-12 py-4 appearance-none font-bold cursor-pointer text-ellipsis overflow-hidden border transition-all ${t.input}`}>
              <option value="year">Group By Year</option>
              <option value="vehicle">Group By Vehicle</option>
            </select>
            <ChevronRight className="absolute right-4 top-1/2 -translate-y-1/2 rotate-90 opacity-50 pointer-events-none flex-shrink-0" size={20} />
          </div>
        </div>
      </div>

      {/* Chart Canvas */}
      <div className={`p-6 md:p-8 rounded-3xl border shadow-xl min-w-0 flex justify-center items-center relative overflow-hidden animate-fade-in-up ${t.card}`} style={{animationDelay: '0.3s'}}>
         {vehicles.length === 0 ? (
           <div className={`text-center py-24 px-4 ${t.muted}`}>
             <BarChart2 size={48} className="mx-auto mb-4 opacity-50" />
             <h3 className="text-xl font-black">Canvas Empty</h3>
             <p className="font-bold">Add vehicles and logs to generate analytics.</p>
           </div>
         ) : (
           <div className="w-full relative min-h-[400px]">
              {chartType === 'bar' && <CustomBarChart data={chartData} t={t} />}
              {chartType === 'line' && <CustomLineChart data={chartData} t={t} />}
           </div>
         )}
      </div>
    </div>
  );
}

// --- Raw SVG Renderers for Chart Builder ---

function CustomBarChart({ data, t }) {
  const [hoverInfo, setHoverInfo] = useState(null);
  const [hiddenSeries, setHiddenSeries] = useState(new Set());
  const [hoveredSeries, setHoveredSeries] = useState(null);

  const toggleSeries = (index) => {
    setHiddenSeries(prev => {
      const next = new Set(prev);
      if (next.has(index)) next.delete(index);
      else next.add(index);
      // Ensure at least one is visible
      if (next.size === data.datasets.length && data.datasets.length > 0) return prev;
      return next;
    });
  };

  const W = 1000, H = 400, pad = { t: 40, b: 60, l: 80, r: 20 };
  const inW = W - pad.l - pad.r;
  const inH = H - pad.t - pad.b;

  const visibleDatasets = data.datasets.filter((_, i) => !hiddenSeries.has(i));

  const maxVal = useMemo(() => {
    let m = 0;
    visibleDatasets.forEach(ds => ds.data.forEach(v => { if(v > m) m = v; }));
    return m === 0 ? 1000 : m * 1.1;
  }, [visibleDatasets]);

  const numGroups = data.labels.length;
  const numBarsPerGroup = visibleDatasets.length;
  const groupWidth = inW / Math.max(1, numGroups);
  const barW = (groupWidth * 0.8) / Math.max(1, numBarsPerGroup);

  return (
    <div className="w-full relative" onMouseLeave={() => { setHoverInfo(null); setHoveredSeries(null); }}>
      {/* Interactive Legend */}
      <div className="flex flex-wrap justify-center gap-3 mb-8 relative z-10 px-10">
         {data.datasets.map((ds, i) => {
           const isHidden = hiddenSeries.has(i);
           return (
             <button 
               key={i} 
               onClick={() => toggleSeries(i)}
               onMouseEnter={() => setHoveredSeries(i)}
               onMouseLeave={() => setHoveredSeries(null)}
               className={`flex items-center gap-2 px-4 py-2 rounded-xl border transition-all duration-300 active:scale-95 ${isHidden ? `opacity-40 bg-black/5 dark:bg-white/5` : `shadow-md ${t.iconBg} transform scale-105`} ${t.border}`}
             >
               <div className={`w-3 h-3 rounded-full shadow-inner ${isHidden ? 'bg-gray-400' : ''}`} style={{backgroundColor: isHidden ? undefined : (ds.color || (ds.colors && ds.colors[i]) || '#888')}}></div> 
               <span className="text-[10px] uppercase tracking-widest font-bold">{ds.label}</span>
             </button>
           );
         })}
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto font-mono text-xs overflow-visible group">
        {/* Y-Axis Grid Lines */}
        {[0, 0.25, 0.5, 0.75, 1].map(pct => {
          const y = pad.t + inH * (1 - pct);
          return (
            <g key={pct}>
              <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="currentColor" strokeOpacity="0.08" strokeWidth="1" strokeDasharray="4 4" />
              <text x={pad.l - 15} y={y + 4} fill="currentColor" opacity="0.6" fontWeight="bold" textAnchor="end">{formatCurrency(maxVal * pct)}</text>
            </g>
          )
        })}

        {/* X-Axis Base Line */}
        <line x1={pad.l} y1={pad.t + inH} x2={W-pad.r} y2={pad.t + inH} stroke="currentColor" strokeOpacity="0.2" strokeWidth="2" strokeLinecap="round" />

        {/* Bars */}
        {data.labels.map((label, gIdx) => {
          const groupX = pad.l + gIdx * groupWidth;
          return (
            <g key={label}>
              <text x={groupX + groupWidth/2} y={H - 20} fill="currentColor" textAnchor="middle" fontWeight="bold" opacity="0.8" className="text-sm">{label}</text>
              
              {data.datasets.map((ds, origIdx) => {
                if (hiddenSeries.has(origIdx)) return null;
                
                // Recalculate bIdx based on visible items
                const bIdx = visibleDatasets.findIndex(vds => vds.id === ds.id);
                
                const val = ds.data[gIdx];
                const barH = (val / maxVal) * inH;
                const bx = groupX + (groupWidth * 0.1) + bIdx * barW;
                const by = pad.t + inH - barH;
                const fillCol = ds.colors ? ds.colors[gIdx] : ds.color;
                
                const isHovered = hoverInfo && hoverInfo.group === label && hoverInfo.title === ds.label;
                const isFaded = (hoverInfo && !isHovered) || (hoveredSeries !== null && hoveredSeries !== origIdx);

                return (
                  <g key={`${gIdx}-${origIdx}`}>
                    {/* Bar Background Trace (Empty track) */}
                    <rect 
                      x={bx + barW*0.1} y={pad.t} width={barW*0.8} height={inH} 
                      fill="currentColor" opacity="0.02" rx="4"
                    />
                    {/* Actual Bar */}
                    <rect 
                      x={bx + barW*0.1} y={by} width={barW*0.8} height={barH} 
                      fill={fillCol} rx="6"
                      className={`transition-all duration-700 ease-out origin-bottom animate-bar-grow ${isFaded ? 'opacity-30 grayscale-[50%]' : 'opacity-100 drop-shadow-md'}`}
                      onMouseEnter={() => setHoverInfo({ cx: bx + barW/2, cy: by, val, title: ds.label, group: label, color: fillCol })}
                    />
                    {/* Invisible Interaction Layer */}
                    <rect 
                      x={bx} y={pad.t} width={barW} height={inH} fill="transparent" className="cursor-pointer"
                      onMouseEnter={() => setHoverInfo({ cx: bx + barW/2, cy: by, val, title: ds.label, group: label, color: fillCol })} 
                    />
                  </g>
                );
              })}
            </g>
          )
        })}
      </svg>
      
      {/* Floating Tooltip */}
      {hoverInfo && (
        <div className={`absolute pointer-events-none z-50 transition-all duration-200 ease-out`} 
             style={{ 
               left: `${(hoverInfo.cx/W)*100}%`, 
               top: `${(hoverInfo.cy/H)*100}%`,
               transform: `translate(${hoverInfo.cx > W * 0.8 ? '-80%' : hoverInfo.cx < W * 0.2 ? '-20%' : '-50%'}, -120%)` 
             }}>
          <div className={`px-3 py-2 sm:px-5 sm:py-4 rounded-xl sm:rounded-2xl border shadow-[0_10px_40px_rgba(0,0,0,0.2)] backdrop-blur-3xl bg-opacity-95 dark:bg-opacity-95 flex flex-col gap-1 min-w-[140px] sm:min-w-[220px] text-center relative ${t.card}`}>
            <div className="absolute -bottom-1.5 sm:-bottom-2 left-1/2 transform -translate-x-1/2 w-3 h-3 sm:w-4 sm:h-4 rotate-45 border-r border-b backdrop-blur-3xl bg-opacity-95 dark:bg-opacity-95" style={{ backgroundColor: 'inherit', borderColor: 'inherit' }}></div>
            <span className={`text-[8px] sm:text-[10px] font-black uppercase tracking-widest ${t.muted}`}>{hoverInfo.group}</span>
            <div className="flex items-center justify-center gap-1.5 sm:gap-2 mt-0.5 sm:mt-1 mb-1 sm:mb-2">
               <div className="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full shadow-inner" style={{backgroundColor: hoverInfo.color}}></div>
               <span className={`font-black text-xs sm:text-sm truncate ${t.accent}`}>{hoverInfo.title}</span>
            </div>
            <div className="w-full h-px bg-current opacity-10 my-0.5 sm:my-1"></div>
            <span className="font-black text-lg sm:text-2xl font-mono mt-0.5 sm:mt-1 tracking-tighter drop-shadow-sm">{formatCurrency(hoverInfo.val)}</span>
          </div>
        </div>
      )}
    </div>
  );
}

function CustomLineChart({ data, t }) {
  const [hoverInfo, setHoverInfo] = useState(null);
  const [hiddenSeries, setHiddenSeries] = useState(new Set());
  const [hoveredSeries, setHoveredSeries] = useState(null);

  const toggleSeries = (index) => {
    setHiddenSeries(prev => {
      const next = new Set(prev);
      if (next.has(index)) next.delete(index);
      else next.add(index);
      if (next.size === data.datasets.length && data.datasets.length > 0) return prev;
      return next;
    });
  };

  const W = 1000, H = 400, pad = { t: 40, b: 60, l: 80, r: 20 };
  const inW = W - pad.l - pad.r;
  const inH = H - pad.t - pad.b;

  const visibleDatasets = data.datasets.filter((_, i) => !hiddenSeries.has(i));

  const maxVal = useMemo(() => {
    let m = 0;
    visibleDatasets.forEach(ds => ds.data.forEach(v => { if(v > m) m = v; }));
    return m === 0 ? 1000 : m * 1.1;
  }, [visibleDatasets]);

  const getX = (idx) => pad.l + (data.labels.length > 1 ? (idx / (data.labels.length - 1)) * inW : inW/2);
  const getY = (val) => pad.t + inH - (val / maxVal) * inH;

  // Function to generate smooth cubic bezier path
  const getSmoothPath = (points) => {
    if (points.length === 0) return '';
    if (points.length === 1) return `M ${points[0].x},${points[0].y}`;
    let path = `M ${points[0].x},${points[0].y}`;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[i];
      const p1 = points[i + 1];
      const cx = (p0.x + p1.x) / 2;
      path += ` C ${cx},${p0.y} ${cx},${p1.y} ${p1.x},${p1.y}`;
    }
    return path;
  };

  return (
    <div className="w-full relative" onMouseLeave={() => { setHoverInfo(null); setHoveredSeries(null); }}>
      
      {/* Definitions for Gradients */}
      <svg width="0" height="0" className="absolute">
        <defs>
          {data.datasets.map((ds, idx) => (
             <linearGradient key={`grad-${idx}`} id={`area-gradient-${idx}`} x1="0" y1="0" x2="0" y2="1">
               <stop offset="0%" stopColor={ds.color || '#888'} stopOpacity="0.4" />
               <stop offset="100%" stopColor={ds.color || '#888'} stopOpacity="0.0" />
             </linearGradient>
          ))}
        </defs>
      </svg>

      {/* Interactive Legend */}
      <div className="flex flex-wrap justify-center gap-3 mb-8 relative z-10 px-10">
         {data.datasets.map((ds, i) => {
           const isHidden = hiddenSeries.has(i);
           return (
             <button 
               key={i} 
               onClick={() => toggleSeries(i)}
               onMouseEnter={() => setHoveredSeries(i)}
               onMouseLeave={() => setHoveredSeries(null)}
               className={`flex items-center gap-2 px-4 py-2 rounded-xl border transition-all duration-300 active:scale-95 ${isHidden ? `opacity-40 bg-black/5 dark:bg-white/5` : `shadow-md ${t.iconBg} transform scale-105`} ${t.border}`}
             >
               <div className={`w-3 h-3 rounded-full shadow-inner ${isHidden ? 'bg-gray-400' : ''}`} style={{backgroundColor: isHidden ? undefined : (ds.color || (ds.colors && ds.colors[i]) || '#888')}}></div> 
               <span className="text-[10px] uppercase tracking-widest font-bold">{ds.label}</span>
             </button>
           );
         })}
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto font-mono text-xs overflow-visible">
        {/* Y-Axis Grid Lines */}
        {[0, 0.25, 0.5, 0.75, 1].map(pct => {
          const y = pad.t + inH * (1 - pct);
          return (
            <g key={pct}>
              <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="currentColor" strokeOpacity="0.08" strokeWidth="1" strokeDasharray="4 4" />
              <text x={pad.l - 15} y={y + 4} fill="currentColor" opacity="0.6" fontWeight="bold" textAnchor="end">{formatCurrency(maxVal * pct)}</text>
            </g>
          )
        })}

        {/* X-Axis Base Line */}
        <line x1={pad.l} y1={pad.t + inH} x2={W-pad.r} y2={pad.t + inH} stroke="currentColor" strokeOpacity="0.2" strokeWidth="2" strokeLinecap="round" />

        {/* X-Axis Labels & Vertical Guidelines */}
        {data.labels.map((label, idx) => {
           const isHoveredCol = hoverInfo && hoverInfo.idx === idx;
           return (
            <g key={idx}>
               <text x={getX(idx)} y={H - 20} fill="currentColor" textAnchor="middle" fontWeight={isHoveredCol ? "black" : "bold"} opacity={isHoveredCol ? "1" : "0.8"} className="text-sm transition-all duration-300">{label}</text>
               {isHoveredCol ? (
                  <line x1={getX(idx)} y1={pad.t} x2={getX(idx)} y2={pad.t+inH} stroke="currentColor" strokeOpacity="0.3" strokeWidth="2" strokeDasharray="6 6" className="transition-all duration-300" />
               ) : (
                  <line x1={getX(idx)} y1={pad.t} x2={getX(idx)} y2={pad.t+inH} stroke="currentColor" strokeOpacity="0.05" />
               )}
            </g>
           )
        })}

        {/* Lines and Areas */}
        <g className="animate-reveal-right">
          {data.datasets.map((ds, origIdx) => {
             if (hiddenSeries.has(origIdx)) return null;

             const isFaded = hoveredSeries !== null && hoveredSeries !== origIdx;
             const opacityClass = isFaded ? 'opacity-30 grayscale-[50%]' : 'opacity-100';
             
             const points = data.labels.map((_, idx) => ({ x: getX(idx), y: getY(ds.data[idx]) }));
             const smoothPath = getSmoothPath(points);
             const areaPath = `${smoothPath} L ${points[points.length-1].x},${pad.t + inH} L ${points[0].x},${pad.t + inH} Z`;

             return (
               <g key={ds.label} className={`transition-all duration-700 ${opacityClass}`}>
                 {/* Area Fill */}
                 <path d={areaPath} fill={`url(#area-gradient-${origIdx})`} className="transition-all duration-500 ease-out" />
                 
                 {/* Stroke Path */}
                 <path 
                   d={smoothPath} fill="none" 
                   stroke={ds.color || '#fff'} strokeWidth="4" 
                   className="drop-shadow-[0_0_8px_rgba(currentColor,0.5)] transition-all duration-500" 
                   strokeLinecap="round" strokeLinejoin="round" 
                 />
                 
                 {/* Points */}
                 {data.labels.map((_, idx) => {
                    const cx = getX(idx), cy = getY(ds.data[idx]), val = ds.data[idx];
                    const dotColor = ds.colors ? ds.colors[idx] : ds.color;
                    const isHoveredDot = hoverInfo && hoverInfo.idx === idx && hoverInfo.title === ds.label;

                    return (
                      <g key={idx}>
                        <circle 
                          cx={cx} cy={cy} r={isHoveredDot ? "8" : "5"} 
                          fill={dotColor} stroke={t.bg.includes('black') ? '#000' : '#fff'} strokeWidth="2.5" 
                          className={`shadow-lg transition-all duration-300 pointer-events-none ${isHoveredDot ? 'drop-shadow-[0_0_10px_currentColor]' : ''}`} 
                        />
                        <circle 
                          cx={cx} cy={cy} r="30" fill="transparent" className="cursor-crosshair" 
                          onMouseEnter={() => setHoverInfo({ idx, cx, cy, val, title: ds.label, group: data.labels[idx], color: dotColor })} 
                        />
                      </g>
                    )
                 })}
               </g>
             )
          })}
        </g>
      </svg>

      {/* Floating Tooltip */}
      {hoverInfo && (
        <div className={`absolute pointer-events-none z-50 transition-all duration-200 ease-out`} 
             style={{ 
               left: `${(hoverInfo.cx/W)*100}%`, 
               top: `${(hoverInfo.cy/H)*100}%`,
               transform: `translate(${hoverInfo.cx > W * 0.8 ? '-80%' : hoverInfo.cx < W * 0.2 ? '-20%' : '-50%'}, -120%)` 
             }}>

function DynamicSelect({ t, value, onChange, defaultOptions, customKey, customOptions, setCustomOptions }) {
  const [isAdding, setIsAdding] = useState(false);
  const [newOpt, setNewOpt] = useState('');

  const allOptions = [...defaultOptions, ...(customOptions[customKey] || [])];
  
  if (value && !allOptions.includes(value) && value !== '__OTHER__') {
    allOptions.push(value);
  }

  const handleChange = (e) => {
    if (e.target.value === '__OTHER__') setIsAdding(true);
    else onChange(e.target.value);
  };

  const handleAdd = () => {
    const val = newOpt.trim();
    if (val && !allOptions.includes(val)) {
      setCustomOptions(prev => ({ ...prev, [customKey]: [...(prev[customKey] || []), val] }));
      onChange(val);
    } else if (val && allOptions.includes(val)) {
      onChange(val);
    } else {
      onChange(allOptions[0]);
    }
    setIsAdding(false);
    setNewOpt('');
  };

  if (isAdding) {
    return (
      <div className="flex gap-2 w-full animate-fade-in">
        <input 
          autoFocus type="text" placeholder="Type custom option..." 
          value={newOpt} onChange={e => setNewOpt(e.target.value)} 
          onKeyDown={e => { if(e.key === 'Enter'){ e.preventDefault(); handleAdd(); } }} 
          className={`flex-1 ${t.isCompact ? 'rounded-lg px-3 py-2.5 text-sm' : 'rounded-2xl px-5 py-4'} outline-none transition-all font-bold truncate border ${t.input}`} 
        />
        <button type="button" onClick={handleAdd} className={`px-4 ${t.isCompact ? 'rounded-lg' : 'rounded-xl'} font-bold transition-all border shadow-sm ${t.btnPrimary}`}><CheckCircle2 size={20}/></button>
        <button type="button" onClick={() => setIsAdding(false)} className={`px-4 ${t.isCompact ? 'rounded-lg' : 'rounded-xl'} font-bold transition-all border shadow-sm ${t.card} ${t.muted}`}><X size={20}/></button>
      </div>
    );
  }

  return (
    <div className="relative">
      <select value={value} onChange={handleChange} className={`w-full ${t.isCompact ? 'rounded-lg pl-3 pr-8 py-2.5 text-sm' : 'rounded-2xl pl-5 pr-12 py-4'} appearance-none font-bold cursor-pointer text-ellipsis overflow-hidden border transition-all ${t.input}`}>
        {allOptions.map(o => <option key={o} value={o}>{o}</option>)}
        <option value="__OTHER__">+ Add Other...</option>
      </select>
      <ChevronRight className="absolute right-3 top-1/2 -translate-y-1/2 rotate-90 opacity-50 pointer-events-none flex-shrink-0" size={16} />
    </div>
  );
}

function LoginScreen({ setAppUser, showToast, firebaseUser, theme, setTheme }) {
  const t = useContext(ThemeContext);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [isLoading, setIsLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setIsLoading(true);
    setError('');

    if (username === 'admin' && password === 'admin123') {
      setAppUser({ uid: 'admin-core', username: 'admin', role: 'admin' });
      showToast('Admin Access Granted');
      setIsLoading(false);
      return;
    }

    if (!firebaseUser) {
       setError('System initializing, please wait...');
       showToast('System initializing, please wait...', 'error');
       setIsLoading(false);
       return;
    }

    try {
      const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'appUsers');
      const unsub = onSnapshot(colRef, (snap) => {
         let matchedUser = null;
         snap.forEach(d => {
            const data = d.data();
            const dbPassword = Cipher.decode(data.password || '');
            if (data.username === username && dbPassword === password) {
               matchedUser = { id: d.id, ...data };
            }
         });
         
         if (matchedUser) {
            setAppUser({ uid: matchedUser.id, username: matchedUser.username, role: matchedUser.role || 'user' });
            showToast(`Welcome back, ${matchedUser.username}`);
         } else {
            setError('Invalid username or password. Please try again.');
            showToast('Invalid credentials', 'error');
         }
         setIsLoading(false);
         unsub(); 
      }, (err) => {
         console.error(err);
         setError('Authentication failed due to a system error.');
         showToast('Authentication failed', 'error');
         setIsLoading(false);
      });
    } catch (err) {
       console.error(err);
       setError('System error occurred during login.');
       showToast('System error', 'error');
       setIsLoading(false);
    }
  };

  return (
    <div className={`min-h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-700 ${t.bg}`}>
      {/* Ambient Animated Backgrounds */}
      <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">

      </div>

      {/* Theme Selector Overlay */}
      <div className={`absolute top-6 right-6 flex gap-2 p-1.5 rounded-xl border shadow-sm backdrop-blur-md z-20 ${t.card}`}>
        <button type="button" onClick={()=>setTheme('arctic')} className={`p-2 rounded-lg transition-all ${theme === 'arctic' ? 'bg-white shadow-sm text-blue-600' : t.muted}`} title="Arctic Pearl"><Sun size={16}/></button>
        <button type="button" onClick={()=>setTheme('obsidian')} className={`p-2 rounded-lg transition-all ${theme === 'obsidian' ? 'bg-slate-700 text-amber-500 shadow-inner' : t.muted}`} title="Midnight Obsidian"><Moon size={16}/></button>
        <button type="button" onClick={()=>setTheme('cyber')} className={`p-2 rounded-lg transition-all ${theme === 'cyber' ? 'bg-black text-cyan-400 shadow-[0_0_8px_rgba(6,182,212,0.5)] border border-cyan-500/50' : t.muted}`} title="Cyber Pulse"><Cpu size={16}/></button>
        <button type="button" onClick={()=>setTheme('titanium')} className={`p-2 rounded-lg transition-all ${theme === 'titanium' ? 'bg-slate-200 text-slate-800 shadow-inner' : t.muted}`} title="Titanium Pro"><Sliders size={16}/></button>
      </div>

      <div className={`w-full max-w-md p-8 sm:p-10 rounded-[2.5rem] border shadow-2xl relative z-10 animate-fade-in-up backdrop-blur-xl ${t.card}`}>
        <div className="absolute -top-12 left-1/2 -translate-x-1/2">
           <AnimatedLogo t={t} />

        <div className="text-center mt-6 mb-8">
          <h1 className={`text-3xl font-black tracking-tighter italic transform -skew-x-6 bg-clip-text text-transparent bg-gradient-to-br ${t.gradientText}`}>
            AutoFleet
          </h1>
          <p className={`text-sm font-bold uppercase tracking-widest mt-2 ${t.muted}`}>Secure Access Terminal</p>

        <form onSubmit={handleLogin} className="space-y-6">
          {error && (

          <div className="space-y-2">
            <label className={`block text-[10px] font-black uppercase tracking-widest pl-2 ${t.muted}`}>Username</label>
            <div className="relative">
              <UserIcon size={18} className={`absolute left-4 top-1/2 -translate-y-1/2 ${t.muted}`} />

        </form>
      </div>
    </div>
  );

function ManageUserDataModal({ user, onClose, showToast }) {
  const t = useContext(ThemeContext);
  const [vehicles, setVehicles] = useState([]);
  const [maintenance, setMaintenance] = useState([]);
  const [consumables, setConsumables] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [confirmAction, setConfirmAction] = useState(null);

  useEffect(() => {
    if (!user) return;
    const unsubV = onSnapshot(collection(db, 'artifacts', appId, 'users', user.id, 'vehicles'), snap => setVehicles(snap.docs.map(d => ({id: d.id, ...d.data()}))));
    const unsubM = onSnapshot(collection(db, 'artifacts', appId, 'users', user.id, 'maintenance'), snap => setMaintenance(snap.docs.map(d => ({id: d.id, ...d.data()}))));
    const unsubC = onSnapshot(collection(db, 'artifacts', appId, 'users', user.id, 'consumables'), snap => setConsumables(snap.docs.map(d => ({id: d.id, ...d.data()}))));
    const unsubR = onSnapshot(collection(db, 'artifacts', appId, 'users', user.id, 'reminders'), snap => setReminders(snap.docs.map(d => ({id: d.id, ...d.data()}))));
    return () => { unsubV(); unsubM(); unsubC(); unsubR(); };
  }, [user]);

  const deleteVehicleCascade = (vehicleId, vehicleName) => {
    setConfirmAction({
      title: `Purge Vehicle: ${vehicleName}`,
      message: 'This will delete the vehicle AND permanently erase all associated maintenance, consumables, and reminder logs. Proceed?',
      onConfirm: async () => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.id, 'vehicles', vehicleId));
          
          const mToDelete = maintenance.filter(m => m.vehicleId === vehicleId);
          await Promise.all(mToDelete.map(m => deleteDoc(doc(db, 'artifacts', appId, 'users', user.id, 'maintenance', m.id))));
          
          const cToDelete = consumables.filter(c => c.vehicleId === vehicleId);
          await Promise.all(cToDelete.map(c => deleteDoc(doc(db, 'artifacts', appId, 'users', user.id, 'consumables', c.id))));
          
          const rToDelete = reminders.filter(r => r.vehicleId === vehicleId);
          await Promise.all(rToDelete.map(r => deleteDoc(doc(db, 'artifacts', appId, 'users', user.id, 'reminders', r.id))));
          
          showToast(`Vehicle ${vehicleName} and all cascading data purged`);
          setConfirmAction(null);
        } catch (err) {
          showToast('Error deleting cascading data', 'error');
        }
      }
    });
  };

  const bulkDelete = (colName, items, displayName) => {
    setConfirmAction({
      title: `Purge ${displayName}`,
      message: `Are you sure you want to permanently erase all ${items.length} records in this category?`,
      onConfirm: async () => {
        try {
          await Promise.all(items.map(item => deleteDoc(doc(db, 'artifacts', appId, 'users', user.id, colName, item.id))));
          showToast(`${displayName} purged successfully`);
          setConfirmAction(null);
        } catch (err) {
          showToast('Error during bulk purge', 'error');
        }
      }
    });
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
      {/* Modal Body */}
      <div className={`border ${t.card} shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col p-6 sm:p-8 rounded-3xl transform transition-all animate-fade-in-up relative overflow-hidden`}>
        {/* Header */}
        <div className="flex justify-between items-center mb-6 border-b border-current border-opacity-10 pb-4">
           <h2 className="text-2xl font-black flex items-center gap-3"><Database className={t.accent} size={28} /> Manage Data: {user.username}</h2>
           <button onClick={onClose} className={`p-2 rounded-xl transition-colors hover:bg-black/10 dark:hover:bg-white/10 ${t.muted}`}><X size={24} /></button>
        </div>
        
        {/* Scrollable Content */}
        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-8">
           {/* Vehicles List */}
           <section>
              <h3 className="text-lg font-bold uppercase tracking-widest mb-4 opacity-80 flex items-center gap-2"><Car size={18}/> Vehicles & Cascading Telemetry</h3>
              {vehicles.length === 0 ? (
                 <div className={`p-4 rounded-xl border border-dashed text-center text-sm font-bold ${t.muted} ${t.border}`}>No vehicles found for this user.</div>
              ) : (
                 <div className="space-y-3">
                    {vehicles.map(v => {
                       const mCount = maintenance.filter(m => m.vehicleId === v.id).length;
                       const cCount = consumables.filter(c => c.vehicleId === v.id).length;
                       return (
                          <div key={v.id} className={`flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 rounded-2xl border shadow-sm ${t.card}`}>
                             <div>

                             </div>
                             <button onClick={() => deleteVehicleCascade(v.id, v.number)} className={`mt-3 sm:mt-0 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 border transition-all hover:bg-rose-500 hover:text-white border-rose-500/30 text-rose-500 bg-rose-500/5`}>
                                <Trash2 size={16} /> Delete Vehicle & Logs

           {/* Bulk Actions */}

              <h3 className="text-lg font-bold uppercase tracking-widest mb-4 opacity-80 flex items-center gap-2"><Database size={18}/> Bulk Purge Actions</h3>

                    <Droplet size={24} /> <span className="font-bold text-sm">Purge All Consumables ({consumables.length})</span>
                 </button>
              </div>

        </div>
      </div>

      {/* Inner Confirm Modal */}
      {confirmAction && (
         <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
            <div className={`border shadow-2xl w-full max-w-md p-8 rounded-3xl transform transition-all animate-fade-in-up border-rose-500/50 ${t.card}`}>
               <div className="w-16 h-16 rounded-full flex items-center justify-center mb-6 shadow-inner border bg-rose-500/20 text-rose-500 border-rose-500/30">
                  <AlertTriangle size={32} />
               </div>
               <h3 className="text-xl font-black mb-2">{confirmAction.title}</h3>
               <p className={`text-sm font-bold mb-8 ${t.muted}`}>{confirmAction.message}</p>
               <div className="flex justify-end gap-4">
                  <button onClick={() => setConfirmAction(null)} className={`px-5 py-2.5 rounded-xl font-bold border transition-colors ${t.card}`}>Cancel</button>
                  <button onClick={confirmAction.onConfirm} className={`px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg text-white bg-rose-600 hover:bg-rose-500`}>Confirm Purge</button>
               </div>
            </div>
         </div>
      )}
    </div>
  );
